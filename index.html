<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>paullew.is</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #071c1a;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* The one and only render target */
    #ascii {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* track the visible viewport on mobile (iOS toolbars) */
      z-index: 3;
    }

    /* Offscreen WebGL render target — tiny, never visible */
    #glcanvas { display: none; }

    /* Controls overlay (toggled with '?') */
    #controls {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      z-index: 6;
      transform: translateX(-50%);
      display: flex;
      gap: 1.2rem;
      align-items: center;
      background: rgba(255,255,255,0.88);
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0.5rem 1.4rem;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #333;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #controls button {
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ccc;
      border-radius: 999px;
      padding: 0.2rem 0.8rem;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #controls button:hover { background: #f0f0f0; }

    #fontBar {
      font-family: Consolas, Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #888;
      user-select: none;
      cursor: pointer;
    }
    #fontBar { touch-action: none; } /* pointer-drag scrubbing on touch */

    @media (max-width: 600px) {
      #controls {
        bottom: calc(0.7rem + env(safe-area-inset-bottom, 0px));
        gap: 0.55rem;
        padding: 0.45rem 0.85rem;
        flex-wrap: wrap;
        justify-content: center;
        border-radius: 18px;
        max-width: calc(100vw - 1.6rem);
        white-space: normal;
      }
      #controls button { min-height: 32px; padding: 0.2rem 0.65rem; }
    }

    /* ── Invisible hit targets over the canvas-stamped UI ─────────────────
       The title, contact hint, and nav link are drawn into the character
       grid itself (see stampUI in the script); these transparent elements
       sit on top of those cells to provide real click/hover/keyboard
       semantics. Positioned from cell coordinates by positionHits(). */
    .hit {
      position: fixed;
      z-index: 5;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: transparent;
      font-size: 0;
      -webkit-tap-highlight-color: transparent;
    }
    /* Contact link rows — HTML text dressed as stamped glyphs. Font size and
       line height are set from the live grid metrics by positionHits(). */
    #contact-links a, #contact-links button {
      position: fixed;
      z-index: 5;
      font-family: Consolas, Menlo, monospace;
      white-space: pre;
      background: #071c1a; /* matches pt.bg — reads as cleared cells */
      border: none;
      padding: 0;
      margin: 0;
      text-decoration: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease;
      transition-delay: var(--d, 0s);
    }
    #contact-links.open a, #contact-links.open button { opacity: 1; }
    #contact-links .c-row { color: rgba(255,255,255,0.75); }
    #contact-links .c-row .ci { color: rgba(232,144,58,0.7); }
    #contact-links .c-row:hover,
    #contact-links .c-row:hover .ci { color: #e8903a; }
    #contact-links .c-copy {
      color: rgba(232,144,58,0.55);
      width: 8ch;
      text-align: right;
      font-size: inherit;
    }
    #contact-links .c-copy:hover { color: #e8903a; }
    #contact-links .c-copy.done  { color: #2db87a; }
    #contact-links ::selection { background: rgba(232,144,58,0.35); }
    #contact-links a:focus-visible, #contact-links button:focus-visible {
      outline: 1px dashed rgba(232,144,58,0.8);
      outline-offset: 2px;
    }

    .hit:focus-visible {
      outline: 1px dashed rgba(232,144,58,0.8);
      outline-offset: 3px;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #071c1a;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #loader.fade-out { opacity: 0; }
  </style>
</head>
<body>
  <div id="loader"></div>
  <canvas id="ascii"></canvas>
  <!-- Interactive layer for the canvas-stamped title / hint / nav -->
  <button class="hit" id="title-hit" aria-label="paullew.is — open contact"></button>
  <button class="hit" id="hint-hit" aria-label="Open contact"></button>
  <a class="hit" id="nav-hit" href="blog/index.html" aria-label="Writing"></a>
  <button class="hit" id="ctl-hit" aria-label="Toggle controls"></button>

  <!-- Contact link rows: real HTML text (selectable, copyable, right-clickable)
       positioned and sized to match the character grid exactly -->
  <div id="contact-links" hidden>
    <a class="c-row" id="c-mail" href="mailto:contact@paullew.is" style="--d:0.17s"><span class="ci">@ </span> contact@paullew.is</a>
    <button class="c-copy" id="c-copy" style="--d:0.17s" aria-label="Copy email address">[copy]</button>
    <a class="c-row" id="c-li" href="https://linkedin.com/in/paullewispgh" target="_blank" rel="noopener" style="--d:0.25s"><span class="ci">in</span> linkedin.com/in/paullewispgh</a>
    <a class="c-row" id="c-gh" href="https://github.com/paullewis2013" target="_blank" rel="noopener" style="--d:0.33s"><span class="ci">gh</span> github.com/paullewis2013</a>
  </div>

  <canvas id="glcanvas"></canvas>
  <div id="controls">
    <span id="fontBar" title="Drag to change character size"></span>
    <button id="pauseBtn">⏸ Pause</button>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Perlin / Simplex noise (public domain — josephg/noisejs) -->

0;i2=1;j2=1;k2=0}else if(x0>=z0){i1=1;j1=0;k1=0;i2=1;j2=0;k2=1}else{i1=0;j1=0;k1=1;i2=1;j2=0;k2=1}}else{if(y0<z0){i1=0;j1=0;k1=1;i2=0;j2=1;k2=1}else if(x0<z0){i1=0;j1=1;k1=0;i2=0;j2=1;k2=1}else{i1=0;j1=1;k1=0;i2=1;j2=1;k2=0}}var x1=x0-i1+G3;var y1=y0-j1+G3;var z1=z0-k1+G3;var x2=x0-i2+2*G3;var y2=y0-j2+2*G3;var z2=z0-k2+2*G3;var x3=x0-1+3*G3;var y3=y0-1+3*G3;var z3=z0-1+3*G3;i&=255;j&=255;k&=255;var gi0=gradP[i+perm[j+perm[k]]];var gi1=gradP[i+i1+perm[j+j1+perm[k+k1]]];var gi2=gradP[i+i2+perm[j+j2+perm[k+k2]]];var gi3=gradP[i+1+perm[j+1+perm[k+1]]];var t0=0.6-x0*x0-y0*y0-z0*z0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot3(x0,y0,z0)}var t1=0.6-x1*x1-y1*y1-z1*z1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot3(x1,y1,z1)}var t2=0.6-x2*x2-y2*y2-z2*z2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot3(x2,y2,z2)}var t3=0.6-x3*x3-y3*y3-z3*z3;if(t3<0){n3=0}else{t3*=t3;n3=t3*t3*gi3.dot3(x3,y3,z3)}return 32*(n0+n1+n2+n3)};module.simplex2=function(xin,yin){var n0,n1,n2;var F2=0.5*(Math.sqrt(3)-1);var s=(xin+yin)*F2;var i=Math.floor(xin+s);var j=Math.floor(yin+s);var G2=(3-Math.sqrt(3))/6;var t=(i+j)*G2;var X0=i-t;var Y0=j-t;var x0=xin-X0;var y0=yin-Y0;var i1,j1;if(x0>y0){i1=1;j1=0}else{i1=0;j1=1}var x1=x0-i1+G2;var y1=y0-j1+G2;var x2=x0-1+2*G2;var y2=y0-1+2*G2;i&=255;j&=255;var gi0=gradP[i+perm[j]];var gi1=gradP[i+i1+perm[j+j1]];var gi2=gradP[i+1+perm[j+1]];var t0=0.5-x0*x0-y0*y0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot2(x0,y0)}var t1=0.5-x1*x1-y1*y1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot2(x1,y1)}var t2=0.5-x2*x2-y2*y2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot2(x2,y2)}return 70*(n0+n1+n2)};})(this);
  </script>

  <!-- Pretext library -->
  <script src="pretext.js"></script>

  <script>
  (() => {
    'use strict';

    // ── Sizing ───────────────────────────────────────────────────────────────
    // Smaller screens get a slightly larger base font → fewer cells → smooth
    // animation on phones instead of the old static fallback page.
    const smallScreen = () => window.innerWidth < 700;
    // Touch-target sizing keys off pointer type, not width — a phone in
    // landscape is 800+px wide but still needs finger-sized targets.
    const coarsePointer = () => window.matchMedia('(pointer: coarse)').matches;
    const baseFontSize = () => (smallScreen() ? 9 : 10);

    // Cap the canvas backing store (~9 MP) and the pixel ratio: crisp text
    // without letting a 4K/retina display quadruple the per-frame fill cost.
    const dpr = () => {
      const raw       = Math.min(window.devicePixelRatio || 1, smallScreen() ? 1.5 : 2);
      const maxByArea = Math.sqrt(9e6 / (window.innerWidth * window.innerHeight));
      return Math.max(1, Math.min(raw, maxByArea));
    };

    // Hard ceiling on cell count — the per-frame sprite-blit budget. On very
    // large windows the effective font size is raised until the grid fits.
    const MAX_CELLS = 33000;

    let fontSize = baseFontSize();
    let cols, rows;

    function charGrid(px) {
      let c, r;
      for (;;) {
        c = Math.max(20, Math.floor(window.innerWidth  / (px * 0.6)));
        r = Math.max(12, Math.floor(window.innerHeight / (px * 1.15)));
        if (c * r <= MAX_CELLS) break;
        px++;
      }
      return { cols: c, rows: r, px };
    }

    // ── Canvases ─────────────────────────────────────────────────────────────
    const asciiCanvas = document.getElementById('ascii');
    const asciiCtx    = asciiCanvas.getContext('2d');
    const glCanvas    = document.getElementById('glcanvas');

    function sizeAsciiCanvas() {
      const r = dpr();
      asciiCanvas.width  = Math.round(window.innerWidth  * r);
      asciiCanvas.height = Math.round(window.innerHeight * r);
    }

    // ── Three.js ─────────────────────────────────────────────────────────────
    const scene    = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: false });

    // The WebGL scene only ever gets sampled down to the character grid, so
    // render it at 2× grid resolution instead of full window resolution.
    // This is the single biggest performance win vs the old version.
    function sizeRenderer() {
      renderer.setSize(cols * 2, rows * 2, false);
    }

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));

    noise.seed(Math.random());

    // ── Helper ───────────────────────────────────────────────────────────────
    function clearScene(objects) {
      objects.forEach(o => scene.remove(o));
      objects.length = 0;
    }

    // ── KOI POND ─────────────────────────────────────────────────────────────
    const FISH = (() => {
      const objects = [], fishes = [], ripples = [], lilyPads = [], skimmers = [], raindrops = [], gustPetals = [], mistPatches = [];
      let sandMesh = null;
      const FISH_COUNT   = 12;
      const RIPPLE_COUNT = 80;
      const RAIN_COUNT   = 90;
      let rainActive = false;
      let mistActive = false;
      const ringGeo   = new THREE.RingGeometry(1, 1.2, 38);
      const shadowGeo = new THREE.CircleGeometry(1, 20);
      const rainGeo   = new THREE.BoxGeometry(0.07, 3.2, 0.07);
      const rainMat   = new THREE.MeshBasicMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.55 });

      // Petal geometry — teardrop shape via two quadratic curves
      const petalShape = new THREE.Shape();
      petalShape.moveTo(0, 0);
      petalShape.quadraticCurveTo( 0.46, 0.28, 0, 1.0);
      petalShape.quadraticCurveTo(-0.46, 0.28, 0, 0);
      const petalGeo = new THREE.ShapeGeometry(petalShape, 8);
      const PETAL_COLORS = [0xf4a8b8, 0xfad4dc, 0xfdf0f0, 0xfbe8d8, 0xf0c8d8];

      // Koi palette: [body hue/sat/lit, fin hue/sat/lit]
      const KOI = [
        { b: [0.05, 0.88, 0.58], d: [0.05, 0.88, 0.30] }, // orange
        { b: [0.08, 0.12, 0.90], d: [0.08, 0.12, 0.62] }, // cream/white
        { b: [0.02, 0.82, 0.50], d: [0.02, 0.82, 0.28] }, // deep red
        { b: [0.11, 0.90, 0.60], d: [0.11, 0.90, 0.34] }, // gold
        { b: [0.04, 0.85, 0.54], d: [0.04, 0.85, 0.28] }, // burnt orange
        { b: [0.09, 0.18, 0.86], d: [0.09, 0.18, 0.58] }, // pale cream
      ];

      // Shared geometry
      const bodyGeo   = new THREE.SphereGeometry(1, 10, 7);
      const tailGeo   = new THREE.BoxGeometry(0.1, 2.6, 2.4);
      const dorsalGeo = new THREE.BoxGeometry(0.09, 1.2, 0.95);
      const eyeGeo    = new THREE.SphereGeometry(0.18, 6, 6);
      const eyeMat    = new THREE.MeshBasicMaterial({ color: 0x060404 });

      function buildKoi(idx) {
        const pal     = KOI[idx % KOI.length];
        const bodyMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(...pal.b) });
        const darkMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(...pal.d) });

        const group = new THREE.Group();

        // Body — plump, elongated along Z
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.scale.set(1.4, 1.0, 3.5);
        group.add(body);

        // Tail pivot
        const tailPivot = new THREE.Group();
        tailPivot.position.z = -3.2;
        const tailFin = new THREE.Mesh(tailGeo, darkMat);
        tailFin.position.z = -1.2;
        tailPivot.add(tailFin);
        group.add(tailPivot);

        // Dorsal fin
        const dorsal = new THREE.Mesh(dorsalGeo, darkMat);
        dorsal.position.set(0, 1.15, 0.3);
        group.add(dorsal);

        // Eyes
        [-1, 1].forEach(s => {
          const eye = new THREE.Mesh(eyeGeo, eyeMat);
          eye.position.set(s * 1.2, 0.35, 2.9);
          group.add(eye);
        });

        return { group, tailPivot };
      }

      function spawnRipple(x, z, startScale, maxLifeBase, maxScale = 9, lifeJitter = 60) {
        const r = ripples.find(r => !r.active);
        if (!r) return;
        r.active = true; r.life = 0;
        r.maxLife    = maxLifeBase + Math.random() * lifeJitter;
        r.startScale = startScale;
        r.maxScale   = maxScale;
        r.mesh.position.set(x, 0.25, z);
        r.mesh.scale.setScalar(startScale);
        r.mat.opacity = 0.85;
      }

      return {
        init() {
          renderer.setClearColor(0x071c1a);
          camera.position.set(0, 58, 22);
          camera.lookAt(0, 0, 0);

          // Pond floor
          const pond = new THREE.Mesh(
            new THREE.CircleGeometry(55, 48),
            new THREE.MeshBasicMaterial({ color: 0x0c2826 })
          );
          pond.rotation.x = -Math.PI / 2;
          pond.position.y = -1.2;
          objects.push(pond); scene.add(pond);

          // Sand — noise-driven vertex colours, mesh drifts slowly in update()
          {
            const geo = new THREE.PlaneGeometry(110, 90, 48, 38);
            const pos = geo.attributes.position.array;
            const col = new Float32Array(pos.length);
            const lo  = new THREE.Color(0x0b2522);
            const hi  = new THREE.Color(0x173630);
            for (let i = 0; i < pos.length / 3; i++) {
              const vx = pos[i * 3], vy = pos[i * 3 + 1];
              const n = (
                noise.simplex2(vx * 0.032, vy * 0.032) * 0.55 +
                noise.simplex2(vx * 0.075, vy * 0.075) * 0.30 +
                noise.simplex2(vx * 0.16,  vy * 0.16)  * 0.15
              ) * 0.5 + 0.5;
              const c = lo.clone().lerp(hi, Math.pow(n, 1.3));
              col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            sandMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
            sandMesh.rotation.x = -Math.PI / 2;
            sandMesh.position.y = -1.19;
            objects.push(sandMesh); scene.add(sandMesh);
          }

          // Lily pads
          [[-20,10],[24,-6],[-4,-22],[32,16],[-26,-4],[12,26],[-16,-16],[28,4],[4,30],[-30,20]].forEach(([x,z], padIdx) => {
            const r        = 2.4 + Math.random() * 2.8;
            const segments = 40;
            const geo      = new THREE.CircleGeometry(r, segments);
            const noiseOff = padIdx * 7.3 + Math.random() * 100; // unique noise origin per pad

            // Vertex colours: noise-driven mottling layered over a radial gradient
            const pos  = geo.attributes.position.array;
            const cols = new Float32Array(pos.length);
            for (let i = 0; i < pos.length / 3; i++) {
              const vx   = pos[i * 3], vy = pos[i * 3 + 1];
              const dist = Math.sqrt(vx * vx + vy * vy) / r;

              // Two octaves of noise for organic blotchiness
              const n = noise.simplex2((vx + noiseOff) * 0.55, (vy + noiseOff) * 0.55) * 0.6
                      + noise.simplex2((vx + noiseOff) * 1.4,  (vy + noiseOff) * 1.4)  * 0.4;
              const t = Math.max(0, Math.min(1, n * 0.5 + 0.5)); // [0,1]

              // Hue shifts slightly across the surface (yellow-green ↔ blue-green)
              const hue = 0.29 + t * 0.08;
              const sat = 0.35 + t * 0.35;
              const lum = 0.07 + (1 - Math.pow(dist, 1.2)) * 0.12 + t * 0.09;

              const c = new THREE.Color().setHSL(hue, sat, lum);
              cols[i * 3] = c.r; cols[i * 3 + 1] = c.g; cols[i * 3 + 2] = c.b;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const pad = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
            pad.rotation.x = -Math.PI / 2;
            pad.rotation.z = Math.random() * Math.PI * 2;
            pad.position.set(x + (Math.random()-0.5)*4, 0.3, z + (Math.random()-0.5)*4);
            pad.noiseOff = padIdx * 5.1 + Math.random() * 100;
            pad.vx = 0; pad.vz = 0;
            pad.anchorX = pad.position.x;
            pad.anchorZ = pad.position.z;
            lilyPads.push(pad);
            objects.push(pad); scene.add(pad);

            // Veins: one main mid-rib + secondary branches on each side
            const veinPositions = [];
            const numPrimary = 7 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numPrimary; i++) {
              const angle  = (i / numPrimary) * Math.PI * 2;
              const reach  = r * (0.78 + Math.random() * 0.18);
              const ex     = Math.cos(angle) * reach;
              const ey     = Math.sin(angle) * reach;
              veinPositions.push(0, 0, 0, ex, ey, 0);
              for (const side of [-1, 1]) {
                const t      = 0.45 + Math.random() * 0.25; // branch point along primary
                const bx     = ex * t, by = ey * t;
                const bAngle = angle + side * (0.4 + Math.random() * 0.25);
                const bLen   = reach * (0.22 + Math.random() * 0.16);
                veinPositions.push(bx, by, 0, bx + Math.cos(bAngle) * bLen, by + Math.sin(bAngle) * bLen, 0);
              }
            }
            const veinGeo = new THREE.BufferGeometry();
            veinGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(veinPositions), 3));
            const veinMesh = new THREE.LineSegments(
              veinGeo,
              new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(0.34, 0.35, 0.18) })
            );
            veinMesh.rotation.x = -Math.PI / 2;
            veinMesh.rotation.z = pad.rotation.z;
            veinMesh.position.set(pad.position.x, 0.31, pad.position.z);
            pad.vein = veinMesh;
            objects.push(veinMesh); scene.add(veinMesh);

            // Shadow on pond floor
            const padShadowMesh = new THREE.Mesh(
              shadowGeo,
              new THREE.MeshBasicMaterial({ color: 0x010504, transparent: true, opacity: 0.5, depthWrite: false })
            );
            padShadowMesh.scale.set(r * 0.92, r * 0.92, 1);
            padShadowMesh.rotation.x = -Math.PI / 2;
            padShadowMesh.position.set(pad.position.x + 1.8, -1.14, pad.position.z + 1.4);
            pad.shadow = padShadowMesh;
            objects.push(padShadowMesh); scene.add(padShadowMesh);
          });

          // Ripple pool
          for (let i = 0; i < RIPPLE_COUNT; i++) {
            const mat  = new THREE.MeshBasicMaterial({ color: 0x1e4c48, side: THREE.DoubleSide, transparent: true, opacity: 0 });
            const mesh = new THREE.Mesh(ringGeo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.y = 0.25;
            mesh.scale.setScalar(0.01);
            ripples.push({ mesh, mat, active: false, life: 0, maxLife: 0, startScale: 0, maxScale: 9 });
            objects.push(mesh); scene.add(mesh);
          }

          // Water skimmers — small dark bugs that zip on the surface
          const skimGeo = new THREE.BoxGeometry(0.28, 0.1, 0.65);
          for (let i = 0; i < 4; i++) {
            const mat  = new THREE.MeshBasicMaterial({ color: 0x071210 });
            const mesh = new THREE.Mesh(skimGeo, mat);
            mesh.position.set((Math.random()-0.5)*56, 0.45, (Math.random()-0.5)*40);
            skimmers.push({ mesh, vx: (Math.random()-0.5)*0.3, vz: (Math.random()-0.5)*0.3, noiseOff: Math.random()*100 });
            objects.push(mesh); scene.add(mesh);
          }

          for (let i = 0; i < FISH_COUNT; i++) {
            const { group, tailPivot } = buildKoi(i);

            // Shadow ellipse on pond floor.
            // Use a Group for heading so rotation.x = -PI/2 on the mesh
            // never hits gimbal lock when the parent rotates around Y.
            const shadowMat  = new THREE.MeshBasicMaterial({
              color: 0x010504, transparent: true, opacity: 0.72, depthWrite: false,
            });
            const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
            shadowMesh.scale.set(1.5, 4.0, 1); // width × length of the ellipse
            shadowMesh.rotation.x = -Math.PI / 2; // lay flat — only rotation on this object
            const shadowGroup = new THREE.Group();
            shadowGroup.position.y = -1.14;
            shadowGroup.add(shadowMesh);
            objects.push(shadowGroup);
            scene.add(shadowGroup);

            const fish = {
              group, tailPivot, shadowGroup,
              pos: new THREE.Vector3(
                (Math.random() - 0.5) * 70,
                0,
                (Math.random() - 0.5) * 55
              ),
              vel: new THREE.Vector3(
                (Math.random() - 0.5) * 0.08,
                0,
                (Math.random() - 0.5) * 0.08
              ),
              phase:    Math.random() * Math.PI * 2,
              noiseOff: i * 8.31,
            };
            fishes.push(fish);
            objects.push(group);
            scene.add(group);
          }

          // Rain pool — pre-allocated, hidden until toggled on
          for (let i = 0; i < RAIN_COUNT; i++) {
            const mesh = new THREE.Mesh(rainGeo, rainMat);
            mesh.rotation.z =  0.12;  // slight wind angle
            mesh.rotation.x = -0.04;
            mesh.visible = false;
            mesh.position.set(
              (Math.random() - 0.5) * 100,
              Math.random() * 50,
              (Math.random() - 0.5) * 80
            );
            raindrops.push({ mesh, speed: 0.55 + Math.random() * 0.35 });
            objects.push(mesh);
            scene.add(mesh);
          }

          // Mist patches — soft radial blobs drifting near the pond edges
          // Shared canvas texture: white centre fading to transparent at edges
          const mistCanvas = document.createElement('canvas');
          mistCanvas.width = mistCanvas.height = 128;
          const mCtx = mistCanvas.getContext('2d');
          const mGrad = mCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
          mGrad.addColorStop(0,    'rgba(255,255,255,0.9)');
          mGrad.addColorStop(0.45, 'rgba(255,255,255,0.4)');
          mGrad.addColorStop(1,    'rgba(255,255,255,0)');
          mCtx.fillStyle = mGrad;
          mCtx.fillRect(0, 0, 128, 128);
          const mistTex = new THREE.CanvasTexture(mistCanvas);

          const mistGeo = new THREE.PlaneGeometry(1, 1);
          for (let i = 0; i < 34; i++) {
            const angle       = (i / 34) * Math.PI * 2;
            const r           = 20 + Math.random() * 20;
            const ax          = Math.cos(angle) * r * 1.3;
            const az          = Math.sin(angle) * r;
            const size        = 12 + Math.random() * 18;
            const baseOpacity = 0.22 + Math.random() * 0.22;
            const mat = new THREE.MeshBasicMaterial({
              map: mistTex, color: 0xd8ecea,
              transparent: true, opacity: baseOpacity,
              side: THREE.DoubleSide, depthWrite: false, depthTest: false,
            });
            const mesh = new THREE.Mesh(mistGeo, mat);
            mesh.scale.set(size, size, 1);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(ax, 3 + Math.random() * 2, az);
            mesh.renderOrder = 2;
            mistPatches.push({ mesh, mat, ax, az, noiseOff: Math.random() * 100, baseOpacity });
            objects.push(mesh);
            scene.add(mesh);
          }
        },

        update(f) {
          const SPEED = 0.072;
          const BX = 42, BZ = 34;

          // Suppress large fish ripples while it's raining
          if (!rainActive && f % 55 === 0) {
            const fish = fishes[Math.floor(Math.random() * fishes.length)];
            spawnRipple(fish.pos.x + (Math.random()-0.5)*3, fish.pos.z + (Math.random()-0.5)*3, 0.1, 140, 9);
          }
          if (!rainActive && f % 120 === 0) spawnRipple((Math.random()-0.5)*60, (Math.random()-0.5)*44, 0.1, 140, 9);

          // Animate ripples — opacity fade so they dissolve smoothly
          ripples.forEach(r => {
            if (!r.active) return;
            r.life++;
            const t = r.life / r.maxLife;
            if (t >= 1) { r.active = false; r.mat.opacity = 0; r.mesh.scale.setScalar(0.01); return; }
            const sc = r.startScale + t * r.maxScale;
            r.mesh.scale.set(sc, sc, sc);
            // Fade in quickly, hold, then dissolve
            const fadeIn  = Math.min(r.life / 12, 1);
            const fadeOut = Math.pow(1 - t, 1.8);
            r.mat.opacity = fadeIn * fadeOut * 0.72;
            const lit = 0.14 + (1 - t) * 0.08;
            r.mat.color.setHSL(0.491, 0.50, lit);
          });

          // Fish separation — accumulate repulsion before individual updates
          const SEP_RADIUS = 9;
          const SEP_FORCE  = 0.028;
          const sepX = new Float32Array(fishes.length);
          const sepZ = new Float32Array(fishes.length);
          for (let a = 0; a < fishes.length; a++) {
            for (let b = a + 1; b < fishes.length; b++) {
              const dx = fishes[a].pos.x - fishes[b].pos.x;
              const dz = fishes[a].pos.z - fishes[b].pos.z;
              const dist2 = dx*dx + dz*dz;
              if (dist2 < SEP_RADIUS * SEP_RADIUS && dist2 > 0.0001) {
                const dist  = Math.sqrt(dist2);
                const force = (1 - dist / SEP_RADIUS) * SEP_FORCE;
                const nx = dx / dist, nz = dz / dist;
                sepX[a] += nx * force;  sepZ[a] += nz * force;
                sepX[b] -= nx * force;  sepZ[b] -= nz * force;
              }
            }
          }

          fishes.forEach((fish, fi) => {
            const { pos, vel, noiseOff } = fish;

            // Each koi has its own independent lazy wander
            const ft = f * 0.0011 + noiseOff;
            const tx = noise.simplex3(ft, 0, 0) * 40;
            const tz = noise.simplex3(0, ft, 0) * 32;

            const ddx = tx - pos.x, ddz = tz - pos.z;
            const dl  = Math.sqrt(ddx*ddx + ddz*ddz) || 1;
            vel.x += (ddx / dl) * 0.006;
            vel.z += (ddz / dl) * 0.006;

            // Fish-to-fish separation
            vel.x += sepX[fi];
            vel.z += sepZ[fi];

            // Soft boundary
            if (pos.x >  BX) vel.x -= 0.018; if (pos.x < -BX) vel.x += 0.018;
            if (pos.z >  BZ) vel.z -= 0.018; if (pos.z < -BZ) vel.z += 0.018;

            // Centre repulsor — fish avoid the content zone
            const rdist = Math.sqrt(pos.x * pos.x + pos.z * pos.z) || 1;
            if (rdist < 20) {
              const push = (20 - rdist) / 20 * 0.022;
              vel.x += (pos.x / rdist) * push;
              vel.z += (pos.z / rdist) * push;
            }

            // Clamp speed
            const spd = Math.sqrt(vel.x*vel.x + vel.z*vel.z) || 1;
            if (spd > SPEED) { vel.x *= SPEED/spd; vel.z *= SPEED/spd; }

            pos.x += vel.x; pos.z += vel.z;
            fish.group.position.set(pos.x, -0.8, pos.z);

            // Orient nose (+z) along velocity
            if (spd > 0.001) fish.group.lookAt(pos.x + vel.x, -0.8, pos.z + vel.z);

            // Slow, graceful tail wag
            const wagAmt = Math.min(spd / SPEED, 1);
            fish.tailPivot.rotation.y = Math.sin(f * 0.062 * (0.6 + wagAmt) + fish.phase) * 0.30;

            // Shadow follows fish on pond floor, offset to suggest angled light
            fish.shadowGroup.position.x = pos.x + 2.5;
            fish.shadowGroup.position.z = pos.z + 2.0;
            fish.shadowGroup.rotation.y = Math.atan2(vel.x, vel.z);
          });

          // Lily pads — gentle drift rotation + slow positional drift
          lilyPads.forEach((pad, i) => {
            pad.rotation.z += Math.sin(f * 0.006 + i * 1.7) * 0.0006;
            const t = f * 0.0008 + pad.noiseOff;
            pad.vx += noise.simplex3(t,       i * 0.4, 7) * 0.0003;
            pad.vz += noise.simplex3(i * 0.4, t,       7) * 0.0003;
            // Spring back toward anchor
            pad.vx += (pad.anchorX - pad.position.x) * 0.0012;
            pad.vz += (pad.anchorZ - pad.position.z) * 0.0012;
            const spd = Math.sqrt(pad.vx * pad.vx + pad.vz * pad.vz);
            if (spd > 0.012) { pad.vx *= 0.012 / spd; pad.vz *= 0.012 / spd; }
            pad.position.x += pad.vx;
            pad.position.z += pad.vz;
            if (pad.vein) {
              pad.vein.position.x = pad.position.x;
              pad.vein.position.z = pad.position.z;
              pad.vein.rotation.z = pad.rotation.z;
            }
            if (pad.shadow) {
              pad.shadow.position.x = pad.position.x + 1.8;
              pad.shadow.position.z = pad.position.z + 1.4;
            }
          });

          // Gust petals — fast wind burst, fade out over lifetime
          for (let gi = gustPetals.length - 1; gi >= 0; gi--) {
            const p = gustPetals[gi];
            p.life++;
            const alpha = Math.max(0, 1 - p.life / p.maxLife);
            p.mat.opacity = alpha;
            const t = f * 0.003 + p.noiseOff;
            p.vx += noise.simplex3(t, gi * 0.5, 9) * 0.004;
            p.vz += noise.simplex3(gi * 0.5, t, 9) * 0.003;
            const spd = Math.sqrt(p.vx * p.vx + p.vz * p.vz);
            if (spd > p.maxSpd) { p.vx *= p.maxSpd / spd; p.vz *= p.maxSpd / spd; }
            p.group.position.x += p.vx;
            p.group.position.z += p.vz;
            p.group.position.y  = 0.7 + Math.sin(f * 0.018 + p.noiseOff) * 0.2 + (p.life / p.maxLife) * -0.3;
            p.group.rotation.y += p.spin;
            if (alpha <= 0) {
              scene.remove(p.group);
              gustPetals.splice(gi, 1);
            }
          }

          // Water skimmers — rapid noisy bursts
          skimmers.forEach((s, i) => {
            const t = f * 0.009 + s.noiseOff;
            s.vx += noise.simplex3(t, i,  0) * 0.055;
            s.vz += noise.simplex3(i, t,  0) * 0.055;
            const spd = Math.sqrt(s.vx*s.vx + s.vz*s.vz);
            const maxSpd = 0.55;
            if (spd > maxSpd) { s.vx *= maxSpd/spd; s.vz *= maxSpd/spd; }
            s.mesh.position.x += s.vx;
            s.mesh.position.z += s.vz;
            if (Math.abs(s.mesh.position.x) > 38) s.vx *= -0.8;
            if (Math.abs(s.mesh.position.z) > 30) s.vz *= -0.8;
            if (spd > 0.01) s.mesh.rotation.y = Math.atan2(s.vx, s.vz);
          });

          // Sand drift — translate the whole plane slowly through noise
          {
            const st = f * 0.007;
            sandMesh.position.x = noise.simplex2(st, 0)        * 10;
            sandMesh.position.z = noise.simplex2(0,  st * 0.7) * 8;
          }

          // Mist drift — fade in/out based on mistActive, creep with noise
          mistPatches.forEach((m, i) => {
            const t      = f * 0.00025 + m.noiseOff;
            const target = mistActive
              ? m.baseOpacity * (0.65 + 0.35 * (noise.simplex3(t * 0.4, 0, m.noiseOff) * 0.5 + 0.5))
              : 0;
            m.mat.opacity += (target - m.mat.opacity) * 0.006;
            if (m.mat.opacity > 0.002) {
              m.mesh.position.x += (m.ax + noise.simplex3(t, i * 0.4, 11) * 7 - m.mesh.position.x) * 0.003;
              m.mesh.position.z += (m.az + noise.simplex3(i * 0.4, t, 11) * 5 - m.mesh.position.z) * 0.003;
            }
          });

          // Rain
          raindrops.forEach(r => {
            r.mesh.visible = rainActive;
            if (!rainActive) return;
            r.mesh.position.y -= r.speed;
            r.mesh.position.x += 0.08;  // drift with wind
            if (r.mesh.position.y < 0) {
              spawnRipple(r.mesh.position.x, r.mesh.position.z, 0.02, 28, 2.5, 12);
              r.mesh.position.set(
                (Math.random() - 0.5) * 100,
                40 + Math.random() * 20,
                (Math.random() - 0.5) * 80
              );
            }
          });
        },

        setRain(on) { rainActive = on; },
        setMist(on) { mistActive = on; },

        // A burst of ripples near the centre — used when the contact block opens
        splash(count = 3) {
          for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = 4 + Math.random() * 12;
            spawnRipple(Math.cos(a) * r, Math.sin(a) * r, 0.1, 110 + Math.random() * 50, 7);
          }
        },

        spawnGust() {
          const count = 65 + Math.floor(Math.random() * 25);
          // Wind blows roughly left-to-right with a slight Z spread
          for (let i = 0; i < count; i++) {
            const col = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
            const mat = new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide, transparent: true, opacity: 1 });
            const mesh = new THREE.Mesh(petalGeo, mat);
            const size = 1.0 + Math.random() * 1.2;
            mesh.scale.set(size, size, 1);
            mesh.rotation.x = -Math.PI / 2;
            const group = new THREE.Group();
            // Start off the left edge, scattered along Z
            group.position.set(
              -60 + Math.random() * 20,
              0.55 + Math.random() * 1.8,
              (Math.random() - 0.5) * 90
            );
            group.rotation.y = Math.random() * Math.PI * 2;
            group.add(mesh);
            scene.add(group);
            const maxLife = 420 + Math.floor(Math.random() * 240); // ~7-11 seconds at 60fps
            gustPetals.push({
              group, mat,
              vx: 0.18 + Math.random() * 0.14,
              vz: (Math.random() - 0.5) * 0.08,
              spin: (Math.random() < 0.5 ? 1 : -1) * (0.02 + Math.random() * 0.03),
              noiseOff: Math.random() * 100,
              maxSpd: 0.22 + Math.random() * 0.08,
              life: 0,
              maxLife,
            });
          }
        },

        dispose() {
          rainActive = false; sandMesh = null;
          clearScene(objects);
          for (const p of gustPetals) scene.remove(p.group);
          fishes.length = 0; ripples.length = 0; lilyPads.length = 0; skimmers.length = 0; raindrops.length = 0; gustPetals.length = 0; mistPatches.length = 0;
        },
      };
    })();

    FISH.init();

    // ── Cinematic intro — camera starts at water level and pulls up ─────────
    const INTRO_FRAMES = 300; // ~5s of sim time
    const CAM_START = { x: 0, y: 3,  z: 36 };
    const LUT_START = { x: 0, y: 0,  z: 8  }; // lookAt target at start
    const LUT_END   = { x: 0, y: 0,  z: 0  };
    const LUM_START = 0.15;
    const LUM_END   = 1.4;

    // Portrait needs a more overhead camera — (0,58,22) was tuned for landscape
    function camEndPosition() {
      const portrait = window.innerHeight > window.innerWidth;
      return portrait
        ? { x: 0, y: 72, z: 10 }   // nearly top-down for portrait
        : { x: 0, y: 58, z: 22 };  // standard landscape end position
    }

    camera.position.set(CAM_START.x, CAM_START.y, CAM_START.z);
    camera.lookAt(LUT_START.x, LUT_START.y, LUT_START.z);

    // ── Contact — expands inline under the title (no modal) ─────────────────
    // The waves and role line are stamped into the grid; the link rows are
    // real HTML text sized to the grid so they can be selected, copied, and
    // right-clicked like normal links.
    const titleHit  = document.getElementById('title-hit');
    const hintHit   = document.getElementById('hint-hit');
    const navHit    = document.getElementById('nav-hit');
    const ctlHit    = document.getElementById('ctl-hit');
    const cLinksEl  = document.getElementById('contact-links');
    const cMail     = document.getElementById('c-mail');
    const cCopy     = document.getElementById('c-copy');
    const cLi       = document.getElementById('c-li');
    const cGh       = document.getElementById('c-gh');

    let contactOpen     = false;
    let contactOpenedAt = 0; // frameNum when opened, for the stamped rows' stagger

    function openContact() {
      if (contactOpen) return;
      contactOpen = true;
      // Skip the stagger if the sim is paused — rows must appear immediately
      contactOpenedAt = running ? frameNum : frameNum - 999;
      FISH.splash(3);
      positionHits();
      cLinksEl.hidden = false;
      requestAnimationFrame(() => cLinksEl.classList.add('open')); // let transition run
      titleHit.setAttribute('aria-expanded', 'true');
      hintHit.setAttribute('aria-expanded', 'true');
      cMail.focus({ preventScroll: true });
      if (!running) renderFrame();
    }
    function closeContact() {
      if (!contactOpen) return;
      contactOpen = false;
      cLinksEl.classList.remove('open');
      cLinksEl.hidden = true;
      positionHits();
      titleHit.setAttribute('aria-expanded', 'false');
      hintHit.setAttribute('aria-expanded', 'false');
      hintHit.focus({ preventScroll: true });
      if (!running) renderFrame();
    }
    titleHit.addEventListener('click', () => contactOpen ? closeContact() : openContact());
    hintHit.addEventListener('click', openContact);
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && contactOpen) closeContact(); });

    // Click-away closes — but never on clicks inside the contact area or the
    // stamped UI, and never while the user has text selected (so selecting
    // the email with the mouse can't accidentally dismiss the block).
    document.addEventListener('click', e => {
      if (!contactOpen) return;
      const t = e.target;
      if (t && t.closest && t.closest('#contact-links, .hit')) return;
      const sel = window.getSelection && window.getSelection();
      if (sel && String(sel).length > 0) return;
      closeContact();
    });

    // Copy-to-clipboard with a brief confirmation state
    {
      let resetTimer = null;
      cCopy.addEventListener('click', async () => {
        const text = 'contact@paullew.is';
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          // Fallback for contexts without the async clipboard API
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch {}
          ta.remove();
        }
        cCopy.textContent = '[copied]';
        cCopy.classList.add('done');
        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          cCopy.textContent = '[copy]';
          cCopy.classList.remove('done');
        }, 1400);
      });
    }

    // Hover/focus feedback for the stamped UI (read by stampUI each frame);
    // the HTML contact rows use plain CSS :hover instead.
    const hover = { title: false, hint: false, nav: false, ctl: false };
    for (const [el, key] of [[titleHit, 'title'], [hintHit, 'hint'], [navHit, 'nav'], [ctlHit, 'ctl']]) {
      const on  = () => { hover[key] = true;  if (!running) renderFrame(); };
      const off = () => { hover[key] = false; if (!running) renderFrame(); };
      el.addEventListener('mouseenter', on);
      el.addEventListener('mouseleave', off);
      el.addEventListener('focus',      on);
      el.addEventListener('blur',       off);
    }

    // ── Pretext ──────────────────────────────────────────────────────────────
    ({ cols, rows, px: fontSize } = charGrid(fontSize));
    sizeAsciiCanvas();
    sizeRenderer();

    const pt = new Pretext({
      cols, rows,
      chars: ' .·',
      satBoost: 0,
      lumBoost: LUM_START,
      font: `${Math.round(fontSize * dpr())}px Consolas, Menlo, monospace`,
      fontSize,
      bg: '#071c1a',
    });

    function setFontSize(px) {
      ({ cols, rows, px } = charGrid(px)); // may raise px to respect MAX_CELLS
      fontSize    = px;
      pt.font     = `${Math.round(px * dpr())}px Consolas, Menlo, monospace`;
      pt.fontSize = px;
      pt.resize(cols, rows);
      sizeRenderer();
      positionHits();
    }

    window.addEventListener('resize', () => {
      const [lo, hi] = fontRange();
      setFontSize(Math.max(lo, Math.min(hi, fontSize)));
      updateFontBar();
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      sizeAsciiCanvas();
      // Re-frame camera when orientation changes / after intro
      if (frameNum > INTRO_FRAMES) {
        const p = camEndPosition();
        camera.position.set(p.x, p.y, p.z);
        camera.lookAt(0, 0, 0);
      }
      renderFrame(); // repaint immediately, even while paused
    });

    // ── Stamped UI — title, hint, nav, and [?] drawn into the character grid ─
    // Rendered with the same font on the same cell grid as the water, so the
    // page text is literally part of the ASCII scene. Cells under a glyph are
    // cleared to the current background; spaces let the water show through.
    const TITLE_ART = [
      "                    _ _               _",
      "  _ __   __ _ _   _| | | _____      _(_)___",
      " | '_ \\ / _` | | | | | |/ _ \\ \\ /\\ / / / __|",
      " | |_) | (_| | |_| | | |  __/\\ V  V /| \\__ \\",
      " | .__/ \\__,_|\\__,_|_|_|\\___| \\_/\\_(_)_|___/",
      " |_|",
    ];
    const TITLE_W   = Math.max(...TITLE_ART.map(l => l.length));
    const TITLE_H   = TITLE_ART.length;
    // The animated domain dot is the LAST '(_)' in the art (line 1 happens to
    // contain the same sequence as part of the letterforms).
    let DOT_ROW = -1;
    for (let r = TITLE_ART.length - 1; r >= 0; r--) {
      if (TITLE_ART[r].includes('(_)')) { DOT_ROW = r; break; }
    }
    const DOT_COL   = TITLE_ART[DOT_ROW].lastIndexOf('(_)') + 1;
    const DOT_CHARS = ['_', '·', '+', '-', '×', '∘', '*', '~', '=', '#', '/', '\\', '|', '^', '%', '!', '?', '@', '&', ':', ';', '<', '>', '{', '}'];
    const HINT_TEXT = '[ contact ]';
    const NAV_TEXT  = '/ writing';

    // Contact block — stamped inline where the hint sits when open.
    // Interactive rows carry a key matching the hover map / hit elements.
    const CT_WAVE  = '~ · ~ · ~ · ~ · ~ · ~ · ~ · ~ · ~';
    const CT_ROLE  = 'fullstack engineer · product & design';
    const CT_LINKS = [
      { key: 'mail', icon: '@ ', text: 'contact@paullew.is', copy: true },
      { key: 'li',   icon: 'in', text: 'linkedin.com/in/paullewispgh' },
      { key: 'gh',   icon: 'gh', text: 'github.com/paullewis2013' },
    ];
    const CT_COPY_W = '[copied]'.length;
    const CT_W = Math.max(
      CT_WAVE.length, CT_ROLE.length,
      ...CT_LINKS.map(l => l.icon.length + 1 + l.text.length + (l.copy ? 2 + CT_COPY_W : 0))
    );
    const CT_H = CT_LINKS.length + 3; // wave + role + links + wave
    const HINT_APPEAR = 192; // sim frames (~3.2s), matching the old CSS delays
    const NAV_APPEAR  = 216; // ~3.6s

    function uiLayout() {
      const titleCol = Math.round((cols - TITLE_W) / 2);
      const titleRow = Math.max(1, Math.round(rows * 0.47 - TITLE_H / 2));
      return {
        titleCol, titleRow,
        hintCol: Math.round((cols - HINT_TEXT.length) / 2),
        hintRow: titleRow + TITLE_H + 1,
        ctCol:   Math.round((cols - CT_W) / 2),
        ctRow:   titleRow + TITLE_H + 1,
        navCol:  cols - NAV_TEXT.length - 2,
        navRow:  1,
        ctlCol:  1,
        ctlRow:  rows - 2 - (coarsePointer() ? 1 : 0), // clear of the iOS home indicator
      };
    }

    // Stamp one block of text; colorFn(charIdx, lineIdx, ch) → fillStyle
    function stampText(lines, col0, row0, colorFn) {
      const cellW = asciiCanvas.width  / cols;
      const cellH = asciiCanvas.height / rows;
      for (let r = 0; r < lines.length; r++) {
        const row = row0 + r;
        if (row < 0 || row >= rows) continue;
        const line = lines[r];
        for (let c = 0; c < line.length; c++) {
          const ch = line[c];
          if (ch === ' ') continue;
          const col = col0 + c;
          if (col < 0 || col >= cols) continue;
          // Clear the cell so the glyph reads over the water
          asciiCtx.fillStyle = pt.bg;
          asciiCtx.fillRect(col * cellW, row * cellH, Math.ceil(cellW), Math.ceil(cellH));
          asciiCtx.fillStyle = colorFn(c, r, ch);
          asciiCtx.fillText(ch, (col + 0.5) * cellW, (row + 0.5) * cellH);
        }
      }
    }

    function stampUI() {
      const L = uiLayout();
      asciiCtx.font         = pt.font;
      asciiCtx.textAlign    = 'center';
      asciiCtx.textBaseline = 'middle';

      // Title — breathing brightness (same 3.8s rhythm as the old CSS glow)
      const breathe = 0.5 + 0.5 * Math.sin((frameNum / 60 / 3.8) * Math.PI * 2);
      const titleA  = hover.title ? 1 : 0.6 + breathe * 0.35;
      const dotA    = 0.5 + 0.5 * Math.sin((frameNum / 60 / 3.8) * Math.PI * 2 + 2.6);
      const dotCh   = DOT_CHARS[Math.floor(frameNum / 5) % DOT_CHARS.length];
      const lines   = TITLE_ART.slice();
      lines[DOT_ROW] = lines[DOT_ROW].slice(0, DOT_COL) + dotCh + lines[DOT_ROW].slice(DOT_COL + 1);
      stampText(lines, L.titleCol, L.titleRow, (c, r) => {
        if (r === DOT_ROW && c === DOT_COL)
          return `rgba(232,144,58,${(0.5 + dotA * 0.5).toFixed(2)})`;
        if (r === DOT_ROW && (c === DOT_COL - 1 || c === DOT_COL + 1))
          return 'rgba(232,144,58,0.7)';
        return `rgba(255,255,255,${titleA.toFixed(2)})`;
      });

      // Contact hint — fades in after the intro settles, replaced by the
      // expanded block while the contact section is open
      if (!contactOpen) {
        const inA = Math.max(0, Math.min(1, (frameNum - HINT_APPEAR) / 48));
        if (inA > 0) {
          const a = (inA * (hover.hint ? 0.95 : 0.55)).toFixed(2);
          stampText([HINT_TEXT], L.hintCol, L.hintRow, () => `rgba(232,144,58,${a})`);
        }
      } else {
        stampContact(L);
      }

      // Nav link and the [?] controls toggle
      const navA = Math.max(0, Math.min(1, (frameNum - NAV_APPEAR) / 30));
      if (navA > 0) {
        stampText([NAV_TEXT], L.navCol, L.navRow, () =>
          hover.nav ? `rgba(232,144,58,${navA.toFixed(2)})`
                    : `rgba(255,255,255,${(navA * 0.5).toFixed(2)})`);

        const ctlOn = controlsEl.classList.contains('visible');
        stampText(['[?]'], L.ctlCol, L.ctlRow, () =>
          (hover.ctl || ctlOn) ? `rgba(232,144,58,${navA.toFixed(2)})`
                               : `rgba(255,255,255,${(navA * 0.35).toFixed(2)})`);
      }
    }

    // Contact block chrome: the waves and role line are stamped; the link
    // rows between them are real HTML text positioned by positionHits().
    function stampContact(L) {
      const rowA = i => Math.max(0, Math.min(1, (frameNum - contactOpenedAt - i * 5) / 12));

      const waveA = rowA(0);
      if (waveA > 0)
        stampText([CT_WAVE], Math.round((cols - CT_WAVE.length) / 2), L.ctRow,
          () => `rgba(45,184,122,${(waveA * 0.45).toFixed(2)})`);

      const roleA = rowA(1);
      if (roleA > 0)
        stampText([CT_ROLE], Math.round((cols - CT_ROLE.length) / 2), L.ctRow + 1,
          () => `rgba(255,255,255,${(roleA * 0.45).toFixed(2)})`);

      const wave2A = rowA(2 + CT_LINKS.length);
      if (wave2A > 0)
        stampText([CT_WAVE], Math.round((cols - CT_WAVE.length) / 2), L.ctRow + 2 + CT_LINKS.length,
          () => `rgba(45,184,122,${(wave2A * 0.45).toFixed(2)})`);
    }

    // Place the transparent interactive elements over the stamped cells
    function positionHits() {
      const cw = window.innerWidth  / cols;
      const chp = window.innerHeight / rows;
      const L  = uiLayout();
      const place = (el, col, row, wCols, hRows, pad) => {
        el.style.left   = (col * cw - pad) + 'px';
        el.style.top    = (row * chp - pad) + 'px';
        el.style.width  = (wCols * cw + pad * 2) + 'px';
        el.style.height = (hRows * chp + pad * 2) + 'px';
      };
      const pad = coarsePointer() ? 16 : 10; // ≥44px touch targets on touch devices
      place(titleHit, L.titleCol, L.titleRow, TITLE_W, TITLE_H, 2);
      place(hintHit,  L.hintCol,  L.hintRow,  HINT_TEXT.length, 1, pad);
      place(navHit,   L.navCol,   L.navRow,   NAV_TEXT.length,  1, pad);
      place(ctlHit,   L.ctlCol,   L.ctlRow,   3,                1, pad);

      // Contact link rows: real HTML text laid onto the grid. Font size and
      // line height come from the live cell metrics so the rows render at
      // exactly the same scale as the stamped characters around them.
      hintHit.style.display = contactOpen ? 'none' : '';
      if (contactOpen) {
        cLinksEl.style.fontSize   = fontSize + 'px';
        const rowY = i => (L.ctRow + 2 + i) * chp; // first link row is 2 below the top wave
        const placeRow = (el, i, col) => {
          el.style.left       = (col * cw) + 'px';
          el.style.top        = rowY(i) + 'px';
          el.style.lineHeight = chp + 'px';
          el.style.height     = chp + 'px';
        };
        placeRow(cMail, 0, L.ctCol);
        placeRow(cCopy, 0, L.ctCol + CT_W - '[copied]'.length);
        placeRow(cLi,   1, L.ctCol);
        placeRow(cGh,   2, L.ctCol);
      }
    }

    // ── Font size control — dotted-track scrubber ───────────────────────────
    const fontBarEl  = document.getElementById('fontBar');
    const FONT_TRACK = 11;
    function fontRange() {
      let [lo, hi] = smallScreen() ? [8, 13] : [6, 16];
      // Never allow a size where the stamped title would clip horizontally
      const fitPx = Math.floor(window.innerWidth / ((TITLE_W + 2) * 0.6));
      hi = Math.max(lo, Math.min(hi, fitPx));
      return [lo, hi];
    }

    function updateFontBar() {
      const [lo, hi] = fontRange();
      const pos = Math.max(0, Math.min(FONT_TRACK - 1,
        Math.round((fontSize - lo) / (hi - lo) * (FONT_TRACK - 1))));
      let bar = '';
      for (let i = 0; i < FONT_TRACK; i++) bar += i === pos ? '●' : '·';
      fontBarEl.textContent = `a ${bar} A`;
    }

    function setFontFromPointer(e) {
      const rect = fontBarEl.getBoundingClientRect();
      // Element renders `a <track> A` — map the pointer onto the dot track,
      // treating the 2-char labels at each end as clamped extremes.
      const charIdx = (e.clientX - rect.left) / rect.width * (FONT_TRACK + 4);
      const t = Math.max(0, Math.min(1, (charIdx - 2) / (FONT_TRACK - 1)));
      const [lo, hi] = fontRange();
      const px = Math.round(lo + t * (hi - lo));
      if (px !== fontSize) {
        setFontSize(px);
        renderFrame(); // repaint immediately, even while paused
      }
      updateFontBar();
    }
    let fontDragging = false;
    fontBarEl.addEventListener('pointerdown', e => {
      fontDragging = true;
      fontBarEl.setPointerCapture(e.pointerId);
      setFontFromPointer(e);
    });
    fontBarEl.addEventListener('pointermove', e => { if (fontDragging) setFontFromPointer(e); });
    fontBarEl.addEventListener('pointerup',   () => fontDragging = false);
    fontBarEl.addEventListener('pointercancel', () => fontDragging = false);

    // ── Pause ────────────────────────────────────────────────────────────────
    let running = true;
    const pauseBtn = document.getElementById('pauseBtn');
    function setRunning(on) {
      running = on;
      pauseBtn.textContent = on ? '⏸ Pause' : '▶ Play';
      if (on) { lastTime = performance.now(); accumulator = 0; requestAnimationFrame(loop); }
    }
    pauseBtn.addEventListener('click', () => setRunning(!running));

    // ── Controls toggle — '?' key or the stamped [?] corner button ──────────
    const controlsEl = document.getElementById('controls');
    function toggleControls() {
      controlsEl.classList.toggle('visible');
      if (!running) renderFrame(); // re-stamp [?] highlight while paused
    }
    document.addEventListener('keydown', e => {
      if (e.key === '?' && !contactOpen) toggleControls();
    });
    ctlHit.addEventListener('click', toggleControls);

    // ── Weather state machine ────────────────────────────────────────────────
    // Only one effect active at a time: rain | mist | petals | clear
    let wxState = 'clear';
    let wxTimer = 900 + Math.floor(Math.random() * 900); // initial clear period

    function tickWeather() {
      if (--wxTimer > 0) return;
      if (wxState !== 'clear') {
        // end current effect, return to clear
        FISH.setRain(false);
        FISH.setMist(false);
        wxState = 'clear';
        wxTimer = 600 + Math.floor(Math.random() * 1200); // 10–30s clear gap
      } else {
        // pick next weather
        const next = ['rain', 'mist', 'petals'][Math.floor(Math.random() * 3)];
        if (next === 'rain') {
          FISH.setRain(true);
          wxState = 'rain';
          wxTimer = 1800 + Math.floor(Math.random() * 3600); // 30–90s
        } else if (next === 'mist') {
          FISH.setMist(true);
          wxState = 'mist';
          wxTimer = 1800 + Math.floor(Math.random() * 2400); // 30–70s
        } else {
          FISH.spawnGust();
          wxState = 'clear'; // petals are fire-and-forget
          wxTimer = 1800 + Math.floor(Math.random() * 1800); // long cooldown
        }
      }
    }

    // ── Main loop: fixed 60Hz simulation, render on rAF ──────────────────────
    // Decoupling the sim from the display refresh keeps the pond running at
    // the same speed on 60/120/144Hz monitors and smooths out frame jitter.
    const loader   = document.getElementById('loader');
    const SIM_STEP = 1000 / 60;
    let frameNum    = 0;
    let lastTime    = performance.now();
    let accumulator = 0;

    function simTick() {
      frameNum++;
      if (frameNum === 2) {
        loader.classList.add('fade-out');
        loader.addEventListener('transitionend', () => loader.remove(), { once: true });
      }
      // Intro camera pull-up + lum reveal
      if (frameNum <= INTRO_FRAMES) {
        const t = frameNum / INTRO_FRAMES;
        const e = 1 - Math.pow(1 - t, 3); // ease-out cubic
        const CAM_END = camEndPosition();
        camera.position.set(
          CAM_START.x + (CAM_END.x - CAM_START.x) * e,
          CAM_START.y + (CAM_END.y - CAM_START.y) * e,
          CAM_START.z + (CAM_END.z - CAM_START.z) * e,
        );
        camera.lookAt(
          LUT_START.x + (LUT_END.x - LUT_START.x) * e,
          LUT_START.y + (LUT_END.y - LUT_START.y) * e,
          LUT_START.z + (LUT_END.z - LUT_START.z) * e,
        );
        pt.lumBoost = LUM_START + (LUM_END - LUM_START) * e;
        pt.satBoost = 2.8 * e;
        const fullChars = Array.from(Pretext.CHARS_WILD);
        const count = Math.max(3, Math.round(e * fullChars.length));
        pt.chars = fullChars.slice(0, count);
      }

      tickWeather();
      FISH.update(frameNum);
    }

    function renderFrame() {
      renderer.render(scene, camera);
      pt.frame(renderer.domElement, asciiCanvas);
      stampUI();
    }

    function loop(now) {
      if (!running) return;
      requestAnimationFrame(loop);
      let dt = now - lastTime;
      lastTime = now;
      if (dt > 250) dt = 250; // tab was hidden or a long hitch — don't fast-forward
      accumulator += dt;
      let stepped = false;
      while (accumulator >= SIM_STEP) {
        simTick();
        accumulator -= SIM_STEP;
        stepped = true;
      }
      if (stepped) renderFrame();
    }

    positionHits();
    updateFontBar();

    // Respect reduced-motion: draw one settled frame and start paused.
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      frameNum   = INTRO_FRAMES;
      pt.lumBoost = LUM_END;
      pt.satBoost = 2.8;
      pt.chars    = Array.from(Pretext.CHARS_WILD);
      const p = camEndPosition();
      camera.position.set(p.x, p.y, p.z);
      camera.lookAt(0, 0, 0);
      simTick();
      renderFrame();
      loader.remove();
      running = false;
      pauseBtn.textContent = '▶ Play';
      controlsEl.classList.add('visible');
    } else {
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
