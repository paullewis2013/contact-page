<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pel.city — ASCII</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stage {
      font-family: Consolas, monospace;
      font-size: 11px;
      line-height: 1.15;
      letter-spacing: 0.05em;
      white-space: pre;
      display: block;
      /* prevent text selection flicker */
      user-select: none;
      -webkit-user-select: none;
    }

    /* hidden WebGL canvas */
    #glcanvas { display: none; }
  </style>
</head>
<body>
  <pre id="stage"></pre>
  <canvas id="glcanvas"></canvas>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Perlin / Simplex noise (same lib used by pel.city) -->
  <script>
  // Minified version of josephg/noisejs (public domain)
  (function(global){var module=global.noise={};function Grad(x,y,z){this.x=x;this.y=y;this.z=z}Grad.prototype.dot2=function(x,y){return this.x*x+this.y*y};Grad.prototype.dot3=function(x,y,z){return this.x*x+this.y*y+this.z*z};var grad3=[new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];var p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];var perm=new Array(512);var gradP=new Array(512);module.seed=function(seed){if(seed>0&&seed<1){seed*=65536}seed=Math.floor(seed);if(seed<256){seed|=seed<<8}for(var i=0;i<256;i++){var v;if(i&1){v=p[i]^(seed&255)}else{v=p[i]^((seed>>8)&255)}perm[i]=perm[i+256]=v;gradP[i]=gradP[i+256]=grad3[v%12]}};module.seed(0);function fade(t){return t*t*t*(t*(t*6-15)+10)}function lerp(a,b,t){return(1-t)*a+t*b}module.simplex3=function(xin,yin,zin){var n0,n1,n2,n3;var F3=1/3;var s=(xin+yin+zin)*F3;var i=Math.floor(xin+s);var j=Math.floor(yin+s);var k=Math.floor(zin+s);var G3=1/6;var t=(i+j+k)*G3;var X0=i-t;var Y0=j-t;var Z0=k-t;var x0=xin-X0;var y0=yin-Y0;var z0=zin-Z0;var i1,j1,k1;var i2,j2,k2;if(x0>=y0){if(y0>=z0){i1=1;j1=0;k1=0;i2=1;j2=1;k2=0}else if(x0>=z0){i1=1;j1=0;k1=0;i2=1;j2=0;k2=1}else{i1=0;j1=0;k1=1;i2=1;j2=0;k2=1}}else{if(y0<z0){i1=0;j1=0;k1=1;i2=0;j2=1;k2=1}else if(x0<z0){i1=0;j1=1;k1=0;i2=0;j2=1;k2=1}else{i1=0;j1=1;k1=0;i2=1;j2=1;k2=0}}var x1=x0-i1+G3;var y1=y0-j1+G3;var z1=z0-k1+G3;var x2=x0-i2+2*G3;var y2=y0-j2+2*G3;var z2=z0-k2+2*G3;var x3=x0-1+3*G3;var y3=y0-1+3*G3;var z3=z0-1+3*G3;i&=255;j&=255;k&=255;var gi0=gradP[i+perm[j+perm[k]]];var gi1=gradP[i+i1+perm[j+j1+perm[k+k1]]];var gi2=gradP[i+i2+perm[j+j2+perm[k+k2]]];var gi3=gradP[i+1+perm[j+1+perm[k+1]]];var t0=0.6-x0*x0-y0*y0-z0*z0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot3(x0,y0,z0)}var t1=0.6-x1*x1-y1*y1-z1*z1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot3(x1,y1,z1)}var t2=0.6-x2*x2-y2*y2-z2*z2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot3(x2,y2,z2)}var t3=0.6-x3*x3-y3*y3-z3*z3;if(t3<0){n3=0}else{t3*=t3;n3=t3*t3*gi3.dot3(x3,y3,z3)}return 32*(n0+n1+n2+n3)};module.simplex2=function(xin,yin){var n0,n1,n2;var F2=0.5*(Math.sqrt(3)-1);var s=(xin+yin)*F2;var i=Math.floor(xin+s);var j=Math.floor(yin+s);var G2=(3-Math.sqrt(3))/6;var t=(i+j)*G2;var X0=i-t;var Y0=j-t;var x0=xin-X0;var y0=yin-Y0;var i1,j1;if(x0>y0){i1=1;j1=0}else{i1=0;j1=1}var x1=x0-i1+G2;var y1=y0-j1+G2;var x2=x0-1+2*G2;var y2=y0-1+2*G2;i&=255;j&=255;var gi0=gradP[i+perm[j]];var gi1=gradP[i+i1+perm[j+j1]];var gi2=gradP[i+1+perm[j+1]];var t0=0.5-x0*x0-y0*y0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot2(x0,y0)}var t1=0.5-x1*x1-y1*y1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot2(x1,y1)}var t2=0.5-x2*x2-y2*y2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot2(x2,y2)}return 70*(n0+n1+n2)};})(this);
  </script>

  <!-- Pretext library -->
  <script src="pretext.js"></script>

  <script>
  (() => {
    'use strict';

    // ── Sizing ──────────────────────────────────────────────────────────────
    const FONT_W = 7.2;   // approx px width of one char at font-size 11px
    const FONT_H = 12.65; // approx px height (11px * line-height 1.15)

    function charGrid() {
      return {
        cols: Math.floor(window.innerWidth  / FONT_W),
        rows: Math.floor(window.innerHeight / FONT_H),
      };
    }

    // ── Three.js scene ──────────────────────────────────────────────────────
    const GL_W = 800, GL_H = 400; // fixed offscreen resolution

    const glCanvas = document.getElementById('glcanvas');
    glCanvas.width  = GL_W;
    glCanvas.height = GL_H;

    const scene    = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: false });
    renderer.setSize(GL_W, GL_H);
    renderer.setClearColor(0x000000);

    let camera = new THREE.PerspectiveCamera(70, GL_W / GL_H, 0.1, 1000);
    camera.position.set(0, 20, 35);
    camera.lookAt(0, 0, 0);

    // Lighting
    const light = new THREE.HemisphereLight(0xdc322f, 0x6c71c4, 0.25);
    scene.add(light);

    // ── Dice ────────────────────────────────────────────────────────────────
    const diceMat = new THREE.MeshPhongMaterial({
      color: 0xf58b5f, shininess: 50, specular: 0xf58b5f, side: THREE.DoubleSide,
    });
    const diceGeos = [
      new THREE.TetrahedronGeometry(2, 0),
      new THREE.BoxGeometry(2, 2, 2),
      new THREE.OctahedronGeometry(2, 0),
      new THREE.DodecahedronGeometry(2, 0),
      new THREE.IcosahedronGeometry(2, 0),
    ];

    const dice = Array.from({ length: 20 }, (_, i) => {
      const geo  = diceGeos[Math.floor(Math.random() * diceGeos.length)];
      const mesh = new THREE.Mesh(geo, diceMat);
      mesh.position.set(-45 + -i * 5, 12 + Math.random() * 28, -20 + Math.random() * 40);
      mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
      scene.add(mesh);
      return mesh;
    });

    // ── Hex terrain ─────────────────────────────────────────────────────────
    const hexGeo = new THREE.CylinderGeometry(1, 1, 10, 6);

    function randColor() {
      const palette = [0xcb4b16, 0xdc322f, 0x2aa198];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    noise.seed(Math.random());

    const terrain = [];
    for (let i = 0; i < 120; i++) {
      terrain[i] = [];
      for (let j = 0; j < 50; j++) {
        const col  = Math.random() < 0.8 ? 0x000000 : randColor();
        const mat  = new THREE.MeshBasicMaterial({ color: col });
        const tile = new THREE.Mesh(hexGeo, mat);
        tile.position.set(
          -80 + i * Math.sqrt(3) + (j % 2) * Math.sqrt(3) / 2,
          1.5 * noise.simplex3(i, j, 0),
          -30 + j * 2
        );
        terrain[i][j] = tile;
        scene.add(tile);
      }
    }

    // ── Pretext ─────────────────────────────────────────────────────────────
    let { cols, rows } = charGrid();
    const pt    = new Pretext({ cols, rows, chars: Pretext.CHARS_FUN, color: true });
    const stage = document.getElementById('stage');

    window.addEventListener('resize', () => {
      const g = charGrid();
      pt.resize(g.cols, g.rows);
    });

    // ── Animation loop ──────────────────────────────────────────────────────
    let frame = 0;

    (function loop() {
      requestAnimationFrame(loop);
      frame++;

      // Move dice
      for (const d of dice) {
        d.rotation.x += 0.02;
        d.position.x  += 0.04;
        if (d.position.x > 45) d.position.x -= 90;
      }

      // Animate terrain
      for (let i = 0; i < terrain.length; i++) {
        for (let j = 0; j < terrain[i].length; j++) {
          const tile = terrain[i][j];
          tile.position.y = -5 + 12 * noise.simplex3(i / 20, j / 20, frame / 1000);

          const r = Math.random();
          if (r < 0.0001) {
            tile.material = new THREE.MeshBasicMaterial({ color: randColor() });
          } else if (r < 0.02) {
            tile.material = new THREE.MeshLambertMaterial({ color: 0xffffff });
          }
        }
      }

      renderer.render(scene, camera);
      pt.frame(glCanvas, stage);
    })();
  })();
  </script>
</body>
</html>
