<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perlin Noise Playground — ASCII</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      overflow: hidden;
      margin: 0;
    }

    #stage {
      display: block;
      position: fixed;
      top: 0; left: 0;
      z-index: 3;
      font-size: 11px;
      line-height: 1.15;
      letter-spacing: 0.05em;
      white-space: pre;
      font-family: Consolas, monospace;
    }

    /* Top mode bar */
    #modebar {
      position: fixed;
      top: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.88);
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0.25rem 0.35rem;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      backdrop-filter: blur(6px);
    }

    #modebar button {
      border: none;
      background: none;
      padding: 0.25rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #modebar button.active {
      background: #cb4b16;
      color: #fff;
    }
    #modebar button:not(.active):hover { background: #f0f0f0; }

    /* Controls overlay */
    #controls {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      z-index: 3;
      transform: translateX(-50%);
      display: flex;
      gap: 1.2rem;
      align-items: center;
      background: rgba(255,255,255,0.88);
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0.5rem 1.4rem;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #333;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    #controls label { font-weight: 700; margin-right: 0.25rem; }

    #controls input[type=range] {
      width: 80px;
      accent-color: #cb4b16;
      cursor: pointer;
      vertical-align: middle;
    }

    #controls select {
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      background: #fff;
    }

    #pauseBtn {
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ccc;
      border-radius: 999px;
      padding: 0.2rem 0.8rem;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
    }
    #pauseBtn:hover { background: #f0f0f0; }


    #glcanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: fill;
    }

    /* pre sits on top of the canvas; background must be transparent */
    #stage { background: transparent; }

    #asciicanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 3;
      display: none;
    }

    #shadercanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      pointer-events: none;
    }

    #divider {
      position: fixed;
      top: 0;
      left: 100%;
      width: 100vw;
      height: 100vh;
      background: rgba(7, 28, 26, 0.78);
      backdrop-filter: blur(5px) saturate(0.75);
      pointer-events: none;
      z-index: 2;
      transform: translateX(-100%);
    }

    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.2;
      white-space: pre;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
      pointer-events: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <pre id="stage"></pre>
  <canvas id="asciicanvas"></canvas>
  <pre id="title">                    _ _               _
  _ __   __ _ _   _| | | _____      _(_)___
 | '_ \ / _` | | | | | |/ _ \ \ /\ / / / __|
 | |_) | (_| | |_| | | |  __/\ V  V /| \__ \
 | .__/ \__,_|\__,_|_|_|\___| \_/\_(_)_|___/
 |_|</pre>
  <canvas id="glcanvas"></canvas>
  <canvas id="shadercanvas"></canvas>
  <div id="divider"></div>

  <div id="modebar">
    <button id="modeOverlay" class="active">Overlay</button>
    <button id="modeProximity">Proximity</button>
    <button id="modeSweep">Autosweep</button>
  </div>

  <div id="controls">
<span><label for="fontSize">Size</label><input id="fontSize" type="range" min="6" max="22" value="11"></span>
    <span>
      <label for="effectPicker">Effect</label>
      <select id="effectPicker">
        <option value="none">None</option>
        <option value="rgb" selected>RGB</option>
      </select>
    </span>
    <span id="overlayControl"><label for="overlay">Overlay</label><input id="overlay" type="range" min="0" max="100" step="1" value="100"></span>
    <button id="rainBtn">Rain: Off</button>
    <button id="pauseBtn">⏸ Pause</button>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Perlin / Simplex noise (public domain — josephg/noisejs) -->

  </script>

  <!-- Pretext library -->
  <script src="pretext.js"></script>

  <script>
  (() => {
    'use strict';

    // ── Sizing ───────────────────────────────────────────────────────────────
    let fontSize = 11;
    let cols, rows;

    function charGrid() {
      return {
        cols: Math.floor(window.innerWidth  / (fontSize * 0.6)),
        rows: Math.floor(window.innerHeight / (fontSize * 1.15)),
      };
    }

    const stage = document.getElementById('stage');

    function fitStage() {
      const charCssW = window.innerWidth  / cols;
      const charCssH = window.innerHeight / rows;
      stage.style.letterSpacing = (charCssW - fontSize * 0.6) + 'px';
      stage.style.lineHeight    = charCssH + 'px';
    }

    // ── Three.js ─────────────────────────────────────────────────────────────
    const glCanvas = document.getElementById('glcanvas');
    const scene    = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));

    noise.seed(Math.random());

    // ── Helper ───────────────────────────────────────────────────────────────
    function clearScene(objects) {
      objects.forEach(o => scene.remove(o));
      objects.length = 0;
    }

    // ── KOI POND ─────────────────────────────────────────────────────────────
    const FISH = (() => {
      const objects = [], fishes = [], ripples = [], lilyPads = [], skimmers = [], petals = [], raindrops = [];
      let sandMesh = null;
      const FISH_COUNT = 12;
      const RIPPLE_COUNT = 80;
      const RAIN_COUNT  = 90;
      let rainActive = false;
      const ringGeo   = new THREE.RingGeometry(1, 1.2, 38);
      const shadowGeo = new THREE.CircleGeometry(1, 20);
      const rainGeo   = new THREE.BoxGeometry(0.07, 3.2, 0.07);
      const rainMat   = new THREE.MeshBasicMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.55 });

      // Petal geometry — teardrop shape via two quadratic curves
      const petalShape = new THREE.Shape();
      petalShape.moveTo(0, 0);
      petalShape.quadraticCurveTo( 0.46, 0.28, 0, 1.0);
      petalShape.quadraticCurveTo(-0.46, 0.28, 0, 0);
      const petalGeo = new THREE.ShapeGeometry(petalShape, 8);
      const PETAL_COLORS = [0xf4a8b8, 0xfad4dc, 0xfdf0f0, 0xfbe8d8, 0xf0c8d8];

      // Koi palette: [body hue/sat/lit, fin hue/sat/lit]
      const KOI = [
        { b: [0.05, 0.88, 0.58], d: [0.05, 0.88, 0.30] }, // orange
        { b: [0.08, 0.12, 0.90], d: [0.08, 0.12, 0.62] }, // cream/white
        { b: [0.02, 0.82, 0.50], d: [0.02, 0.82, 0.28] }, // deep red
        { b: [0.11, 0.90, 0.60], d: [0.11, 0.90, 0.34] }, // gold
        { b: [0.04, 0.85, 0.54], d: [0.04, 0.85, 0.28] }, // burnt orange
        { b: [0.09, 0.18, 0.86], d: [0.09, 0.18, 0.58] }, // pale cream
      ];

      // Shared geometry
      const bodyGeo   = new THREE.SphereGeometry(1, 10, 7);
      const tailGeo   = new THREE.BoxGeometry(0.1, 2.6, 2.4);
      const dorsalGeo = new THREE.BoxGeometry(0.09, 1.2, 0.95);
      const eyeGeo    = new THREE.SphereGeometry(0.18, 6, 6);
      const eyeMat    = new THREE.MeshBasicMaterial({ color: 0x060404 });

      function buildKoi(idx) {
        const pal     = KOI[idx % KOI.length];
        const bodyMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(...pal.b) });
        const darkMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(...pal.d) });

        const group = new THREE.Group();

        // Body — plump, elongated along Z
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.scale.set(1.4, 1.0, 3.5);
        group.add(body);

        // Tail pivot
        const tailPivot = new THREE.Group();
        tailPivot.position.z = -3.2;
        const tailFin = new THREE.Mesh(tailGeo, darkMat);
        tailFin.position.z = -1.2;
        tailPivot.add(tailFin);
        group.add(tailPivot);

        // Dorsal fin
        const dorsal = new THREE.Mesh(dorsalGeo, darkMat);
        dorsal.position.set(0, 1.15, 0.3);
        group.add(dorsal);

        // Eyes
        [-1, 1].forEach(s => {
          const eye = new THREE.Mesh(eyeGeo, eyeMat);
          eye.position.set(s * 1.2, 0.35, 2.9);
          group.add(eye);
        });

        return { group, tailPivot, bodyMat, darkMat };
      }

      return {
        init() {
          renderer.setClearColor(0x071c1a);
          camera.position.set(0, 58, 22);
          camera.lookAt(0, 0, 0);

          // Pond floor
          const pond = new THREE.Mesh(
            new THREE.CircleGeometry(55, 48),
            new THREE.MeshBasicMaterial({ color: 0x0c2826 })
          );
          pond.rotation.x = -Math.PI / 2;
          pond.position.y = -1.2;
          objects.push(pond); scene.add(pond);

          // Sand — noise-driven vertex colours, mesh drifts slowly in update()
          {
            const geo = new THREE.PlaneGeometry(110, 90, 48, 38);
            const pos = geo.attributes.position.array;
            const col = new Float32Array(pos.length);
            const lo  = new THREE.Color(0x0b2522);
            const hi  = new THREE.Color(0x173630);
            for (let i = 0; i < pos.length / 3; i++) {
              const vx = pos[i * 3], vy = pos[i * 3 + 1];
              const n = (
                noise.simplex2(vx * 0.032, vy * 0.032) * 0.55 +
                noise.simplex2(vx * 0.075, vy * 0.075) * 0.30 +
                noise.simplex2(vx * 0.16,  vy * 0.16)  * 0.15
              ) * 0.5 + 0.5;
              const c = lo.clone().lerp(hi, Math.pow(n, 1.3));
              col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            sandMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
            sandMesh.rotation.x = -Math.PI / 2;
            sandMesh.position.y = -1.19;
            objects.push(sandMesh); scene.add(sandMesh);
          }

          // Lily pads
          [[-20,10],[24,-6],[-4,-22],[32,16],[-26,-4],[12,26],[-16,-16],[28,4],[0,18],[-30,20]].forEach(([x,z], padIdx) => {
            const r        = 2.4 + Math.random() * 2.8;
            const segments = 40;
            const geo      = new THREE.CircleGeometry(r, segments);
            const noiseOff = padIdx * 7.3 + Math.random() * 100; // unique noise origin per pad

            // Vertex colours: noise-driven mottling layered over a radial gradient
            const pos  = geo.attributes.position.array;
            const cols = new Float32Array(pos.length);
            for (let i = 0; i < pos.length / 3; i++) {
              const vx   = pos[i * 3], vy = pos[i * 3 + 1];
              const dist = Math.sqrt(vx * vx + vy * vy) / r;

              // Two octaves of noise for organic blotchiness
              const n = noise.simplex2((vx + noiseOff) * 0.55, (vy + noiseOff) * 0.55) * 0.6
                      + noise.simplex2((vx + noiseOff) * 1.4,  (vy + noiseOff) * 1.4)  * 0.4;
              const t = Math.max(0, Math.min(1, n * 0.5 + 0.5)); // [0,1]

              // Hue shifts slightly across the surface (yellow-green ↔ blue-green)
              const hue = 0.29 + t * 0.08;
              // Saturation: lower in bleached patches, higher in rich green zones
              const sat = 0.35 + t * 0.35;
              // Lightness: radial falloff + noise bump; edge is darker, highlights near centre
              const lum = 0.07 + (1 - Math.pow(dist, 1.2)) * 0.12 + t * 0.09;

              const c = new THREE.Color().setHSL(hue, sat, lum);
              cols[i * 3] = c.r; cols[i * 3 + 1] = c.g; cols[i * 3 + 2] = c.b;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const pad = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
            pad.rotation.x = -Math.PI / 2;
            pad.rotation.z = Math.random() * Math.PI * 2;
            pad.position.set(x + (Math.random()-0.5)*4, 0.3, z + (Math.random()-0.5)*4);
            lilyPads.push(pad);
            objects.push(pad); scene.add(pad);

            // Veins: one main mid-rib + secondary branches on each side
            const veinPositions = [];
            const numPrimary = 7 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numPrimary; i++) {
              const angle  = (i / numPrimary) * Math.PI * 2;
              const reach  = r * (0.78 + Math.random() * 0.18);
              const ex     = Math.cos(angle) * reach;
              const ey     = Math.sin(angle) * reach;
              // Primary vein
              veinPositions.push(0, 0, 0, ex, ey, 0);
              // Two short secondary branches per primary
              for (const side of [-1, 1]) {
                const t      = 0.45 + Math.random() * 0.25; // branch point along primary
                const bx     = ex * t, by = ey * t;
                const bAngle = angle + side * (0.4 + Math.random() * 0.25);
                const bLen   = reach * (0.22 + Math.random() * 0.16);
                veinPositions.push(bx, by, 0, bx + Math.cos(bAngle) * bLen, by + Math.sin(bAngle) * bLen, 0);
              }
            }
            const veinGeo = new THREE.BufferGeometry();
            veinGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(veinPositions), 3));
            const veinMesh = new THREE.LineSegments(
              veinGeo,
              new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(0.34, 0.35, 0.18) })
            );
            veinMesh.rotation.x = -Math.PI / 2;
            veinMesh.rotation.z = pad.rotation.z;
            veinMesh.position.set(pad.position.x, 0.31, pad.position.z);
            objects.push(veinMesh); scene.add(veinMesh);
          });

          // Ripple pool
          for (let i = 0; i < RIPPLE_COUNT; i++) {
            const mat  = new THREE.MeshBasicMaterial({ color: 0x1e4c48, side: THREE.DoubleSide, transparent: true, opacity: 0 });
            const mesh = new THREE.Mesh(ringGeo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.y = 0.25;
            mesh.scale.setScalar(0.01);
            ripples.push({ mesh, mat, active: false, life: 0, maxLife: 0, startScale: 0, maxScale: 9 });
            objects.push(mesh); scene.add(mesh);
          }

          // Water skimmers — small dark bugs that zip on the surface
          const skimGeo = new THREE.BoxGeometry(0.28, 0.1, 0.65);
          for (let i = 0; i < 4; i++) {
            const mat  = new THREE.MeshBasicMaterial({ color: 0x071210 });
            const mesh = new THREE.Mesh(skimGeo, mat);
            mesh.position.set((Math.random()-0.5)*56, 0.45, (Math.random()-0.5)*40);
            skimmers.push({ mesh, vx: (Math.random()-0.5)*0.3, vz: (Math.random()-0.5)*0.3, noiseOff: Math.random()*100 });
            objects.push(mesh); scene.add(mesh);
          }

          for (let i = 0; i < FISH_COUNT; i++) {
            const { group, tailPivot, bodyMat, darkMat } = buildKoi(i);

            // Shadow ellipse on pond floor.
            // Use a Group for heading so rotation.x = -PI/2 on the mesh
            // never hits gimbal lock when the parent rotates around Y.
            const shadowMat  = new THREE.MeshBasicMaterial({
              color: 0x010504, transparent: true, opacity: 0.72, depthWrite: false,
            });
            const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
            shadowMesh.scale.set(1.5, 4.0, 1); // width × length of the ellipse
            shadowMesh.rotation.x = -Math.PI / 2; // lay flat — only rotation on this object
            const shadowGroup = new THREE.Group();
            shadowGroup.position.y = -1.14;
            shadowGroup.add(shadowMesh);
            objects.push(shadowGroup);
            scene.add(shadowGroup);

            const fish = {
              group, tailPivot, bodyMat, darkMat, shadowGroup,
              pos: new THREE.Vector3(
                (Math.random() - 0.5) * 70,
                0,
                (Math.random() - 0.5) * 55
              ),
              vel: new THREE.Vector3(
                (Math.random() - 0.5) * 0.08,
                0,
                (Math.random() - 0.5) * 0.08
              ),
              phase:      Math.random() * Math.PI * 2,
              noiseOff:   i * 8.31,
              palIdx:     i % KOI.length,
            };
            fishes.push(fish);
            objects.push(group);
            scene.add(group);
          }

          // Petals — scattered across the pond, above lily pads
          for (let i = 0; i < 24; i++) {
            const col  = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
            const mat  = new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(petalGeo, mat);
            const size = 1.1 + Math.random() * 0.9;
            mesh.scale.set(size, size, 1);
            mesh.rotation.x = -Math.PI / 2;

            const group = new THREE.Group();
            group.position.set(
              (Math.random() - 0.5) * 100,
              0.55,
              (Math.random() - 0.5) * 80
            );
            group.rotation.y = Math.random() * Math.PI * 2;
            group.add(mesh);

            petals.push({
              group,
              vx: (Math.random() - 0.5) * 0.04 + 0.018,
              vz: (Math.random() - 0.5) * 0.04 + 0.010,
              spin:     (Math.random() < 0.5 ? 1 : -1) * (0.006 + Math.random() * 0.010),
              noiseOff: Math.random() * 100,
            });
            objects.push(group);
            scene.add(group);
          }

          // Rain pool — pre-allocated, hidden until toggled on
          for (let i = 0; i < RAIN_COUNT; i++) {
            const mesh = new THREE.Mesh(rainGeo, rainMat);
            mesh.rotation.z =  0.12;  // slight wind angle
            mesh.rotation.x = -0.04;
            mesh.visible = false;
            mesh.position.set(
              (Math.random() - 0.5) * 100,
              Math.random() * 50,
              (Math.random() - 0.5) * 80
            );
            raindrops.push({ mesh, speed: 0.55 + Math.random() * 0.35 });
            objects.push(mesh);
            scene.add(mesh);
          }
        },

        update(f) {
          const SPEED = 0.072;
          const BX = 42, BZ = 34;

          // Spawn ripples
          function spawnRipple(x, z, startScale, maxLifeBase, maxScale = 9, lifeJitter = 60) {
            const r = ripples.find(r => !r.active);
            if (!r) return;
            r.active = true; r.life = 0;
            r.maxLife    = maxLifeBase + Math.random() * lifeJitter;
            r.startScale = startScale;
            r.maxScale   = maxScale;
            r.mesh.position.set(x, 0.25, z);
            r.mesh.scale.setScalar(startScale);
            r.mat.opacity = 0.85;
          }
          function spawnRippleSet(x, z) {
            spawnRipple(x, z, 0.1, 140, 9);   // inner ring
            spawnRipple(x, z, 1.0, 110, 9);   // outer ring
          }
          // Suppress large fish ripples while it's raining
          if (!rainActive && f % 55 === 0) {
            const fish = fishes[Math.floor(Math.random() * fishes.length)];
            spawnRippleSet(fish.pos.x + (Math.random()-0.5)*3, fish.pos.z + (Math.random()-0.5)*3);
          }
          if (!rainActive && f % 120 === 0) spawnRippleSet((Math.random()-0.5)*60, (Math.random()-0.5)*44);

          // Animate ripples — opacity fade so they dissolve smoothly
          ripples.forEach(r => {
            if (!r.active) return;
            r.life++;
            const t = r.life / r.maxLife;
            if (t >= 1) { r.active = false; r.mat.opacity = 0; r.mesh.scale.setScalar(0.01); return; }
            const sc = r.startScale + t * r.maxScale;
            r.mesh.scale.set(sc, sc, sc);
            // Fade in quickly, hold, then dissolve
            const fadeIn  = Math.min(r.life / 12, 1);
            const fadeOut = Math.pow(1 - t, 1.8);
            r.mat.opacity = fadeIn * fadeOut * 0.72;
            const lit = 0.14 + (1 - t) * 0.08;
            r.mat.color.setHSL(0.491, 0.50, lit);
          });

          fishes.forEach(fish => {
            const { pos, vel, noiseOff } = fish;

            // Each koi has its own independent lazy wander
            const ft = f * 0.0011 + noiseOff;
            const tx = noise.simplex3(ft, 0, 0) * 40;
            const tz = noise.simplex3(0, ft, 0) * 32;

            const ddx = tx - pos.x, ddz = tz - pos.z;
            const dl  = Math.sqrt(ddx*ddx + ddz*ddz) || 1;
            vel.x += (ddx / dl) * 0.006;
            vel.z += (ddz / dl) * 0.006;

            // Soft boundary
            if (pos.x >  BX) vel.x -= 0.018; if (pos.x < -BX) vel.x += 0.018;
            if (pos.z >  BZ) vel.z -= 0.018; if (pos.z < -BZ) vel.z += 0.018;

            // Centre repulsor — fish avoid the content zone
            const rdist = Math.sqrt(pos.x * pos.x + pos.z * pos.z) || 1;
            if (rdist < 20) {
              const push = (20 - rdist) / 20 * 0.022;
              vel.x += (pos.x / rdist) * push;
              vel.z += (pos.z / rdist) * push;
            }

            // Clamp speed
            const spd = Math.sqrt(vel.x*vel.x + vel.z*vel.z) || 1;
            if (spd > SPEED) { vel.x *= SPEED/spd; vel.z *= SPEED/spd; }

            pos.x += vel.x; pos.z += vel.z;
            fish.group.position.set(pos.x, -0.8, pos.z);

            // Orient nose (+z) along velocity
            if (spd > 0.001) fish.group.lookAt(pos.x + vel.x, -0.8, pos.z + vel.z);

            // Slow, graceful tail wag
            const wagAmt = Math.min(spd / SPEED, 1);
            fish.tailPivot.rotation.y = Math.sin(f * 0.062 * (0.6 + wagAmt) + fish.phase) * 0.30;

            // Shadow follows fish on pond floor, offset to suggest angled light
            fish.shadowGroup.position.x = pos.x + 2.5;
            fish.shadowGroup.position.z = pos.z + 2.0;
            fish.shadowGroup.rotation.y = Math.atan2(vel.x, vel.z);
          });

          // Lily pads — gentle drift rotation
          lilyPads.forEach((pad, i) => {
            pad.rotation.z += Math.sin(f * 0.006 + i * 1.7) * 0.0006;
          });

          // Petals — drift on a light breeze, spin slowly, bob gently
          petals.forEach((p, i) => {
            const t = f * 0.0022 + p.noiseOff;
            p.vx += noise.simplex3(t,        i * 0.6, 3) * 0.0015;
            p.vz += noise.simplex3(i * 0.6,  t,       3) * 0.0015;
            const spd = Math.sqrt(p.vx * p.vx + p.vz * p.vz);
            if (spd > 0.065) { p.vx *= 0.065 / spd; p.vz *= 0.065 / spd; }

            p.group.position.x += p.vx;
            p.group.position.z += p.vz;
            p.group.position.y  = 0.55 + Math.sin(f * 0.016 + p.noiseOff) * 0.12;
            p.group.rotation.y += p.spin;

            // Wrap — re-enter from the opposite edge
            if (p.group.position.x >  56) p.group.position.x = -56;
            if (p.group.position.x < -56) p.group.position.x =  56;
            if (p.group.position.z >  44) p.group.position.z = -44;
            if (p.group.position.z < -44) p.group.position.z =  44;
          });

          // Water skimmers — rapid noisy bursts
          skimmers.forEach((s, i) => {
            const t = f * 0.009 + s.noiseOff;
            s.vx += noise.simplex3(t, i,  0) * 0.055;
            s.vz += noise.simplex3(i, t,  0) * 0.055;
            const spd = Math.sqrt(s.vx*s.vx + s.vz*s.vz);
            const maxSpd = 0.55;
            if (spd > maxSpd) { s.vx *= maxSpd/spd; s.vz *= maxSpd/spd; }
            s.mesh.position.x += s.vx;
            s.mesh.position.z += s.vz;
            if (Math.abs(s.mesh.position.x) > 38) s.vx *= -0.8;
            if (Math.abs(s.mesh.position.z) > 30) s.vz *= -0.8;
            if (spd > 0.01) s.mesh.rotation.y = Math.atan2(s.vx, s.vz);
          });

          // Sand drift — translate the whole plane slowly through noise
          {
            const st = f * 0.007;
            sandMesh.position.x = noise.simplex2(st, 0)      * 10;
            sandMesh.position.z = noise.simplex2(0,  st * 0.7) * 8;
          }

          // Rain
          raindrops.forEach(r => {
            r.mesh.visible = rainActive;
            if (!rainActive) return;
            r.mesh.position.y -= r.speed;
            r.mesh.position.x += 0.08;  // drift with wind
            if (r.mesh.position.y < 0) {
              spawnRipple(r.mesh.position.x, r.mesh.position.z, 0.02, 28, 2.5, 12);
              r.mesh.position.set(
                (Math.random() - 0.5) * 100,
                40 + Math.random() * 20,
                (Math.random() - 0.5) * 80
              );
            }
          });
        },

        toggleRain() {
          rainActive = !rainActive;
          return rainActive;
        },

        dispose() {
          rainActive = false; sandMesh = null;
          clearScene(objects);
          fishes.length = 0; ripples.length = 0; lilyPads.length = 0; skimmers.length = 0; petals.length = 0; raindrops.length = 0;
        },

      };
    })();

    FISH.init();

    const rainBtn = document.getElementById('rainBtn');
    rainBtn.addEventListener('click', () => {
      const on = FISH.toggleRain();
      rainBtn.textContent = on ? 'Rain: On' : 'Rain: Off';
      rainBtn.style.background = on ? '#e8f4f8' : '';
    });

    // ── Pretext ──────────────────────────────────────────────────────────────
    ({ cols, rows } = charGrid());
    const asciiCanvas = document.getElementById('asciicanvas');
    asciiCanvas.width  = window.innerWidth;
    asciiCanvas.height = window.innerHeight;

    const CANVAS_THRESHOLD = 10000; // cells above this → canvas path
    let useCanvasMode = cols * rows > CANVAS_THRESHOLD;

    function applyMode() {
      useCanvasMode = cols * rows > CANVAS_THRESHOLD;
      stage.style.display       = useCanvasMode ? 'none' : '';
      asciiCanvas.style.display = useCanvasMode ? 'block' : 'none';
    }
    applyMode();

    const pt = new Pretext({
      cols, rows,
      chars: Pretext.CHARS_WILD,
      color: true,
      satBoost: 2.8,
      lumBoost: 1.4,
      font: `${fontSize}px Consolas, monospace`,
      fontSize,
      bg: '#071c1a',
    });
    fitStage();

    window.addEventListener('resize', () => {
      ({ cols, rows } = charGrid());
      pt.resize(cols, rows);
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      asciiCanvas.width  = window.innerWidth;
      asciiCanvas.height = window.innerHeight;
      fitStage();
      resizeShaderCanvas();
      applyMode();
    });

    // ── RGB channel-shift shader (right side) ────────────────────────────────
    const shaderCanvas = document.getElementById('shadercanvas');
    const sg = shaderCanvas.getContext('webgl');

    function _compileShader(gl, src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    const _rgbVert = `
      attribute vec2 a_pos;
      varying vec2 v_uv;
      void main() {
        v_uv = a_pos * 0.5 + 0.5;
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }`;

    const _rgbFrag = `
      precision mediump float;
      uniform sampler2D u_tex;
      uniform vec2 u_res;
      uniform float u_time;
      uniform float u_mouse_x;
      varying vec2 v_uv;
      void main() {
        float angle = u_time;
        vec2 ro = vec2(cos(angle), sin(angle));
        angle += radians(120.0);
        vec2 go = vec2(cos(angle), sin(angle));
        angle += radians(120.0);
        vec2 bo = vec2(cos(angle), sin(angle));

        float sz = 0.03 * length(gl_FragCoord.xy - 0.5 * u_res);
        sz *= u_mouse_x / u_res.x;

        float r = texture2D(u_tex, v_uv - sz * ro / u_res).r;
        float g = texture2D(u_tex, v_uv - sz * go / u_res).g;
        float b = texture2D(u_tex, v_uv - sz * bo / u_res).b;

        gl_FragColor = vec4(r, g, b, 1.0);
      }`;

    const _rgbProg = sg.createProgram();
    sg.attachShader(_rgbProg, _compileShader(sg, _rgbVert, sg.VERTEX_SHADER));
    sg.attachShader(_rgbProg, _compileShader(sg, _rgbFrag, sg.FRAGMENT_SHADER));
    sg.linkProgram(_rgbProg);
    sg.useProgram(_rgbProg);

    const _aPos    = sg.getAttribLocation(_rgbProg,  'a_pos');
    const _uTex    = sg.getUniformLocation(_rgbProg, 'u_tex');
    const _uRes    = sg.getUniformLocation(_rgbProg, 'u_res');
    const _uTime   = sg.getUniformLocation(_rgbProg, 'u_time');
    const _uMouseX = sg.getUniformLocation(_rgbProg, 'u_mouse_x');

    const _quadBuf = sg.createBuffer();
    sg.bindBuffer(sg.ARRAY_BUFFER, _quadBuf);
    sg.bufferData(sg.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), sg.STATIC_DRAW);

    const _rgbTex = sg.createTexture();
    sg.bindTexture(sg.TEXTURE_2D, _rgbTex);
    sg.texParameteri(sg.TEXTURE_2D, sg.TEXTURE_WRAP_S, sg.CLAMP_TO_EDGE);
    sg.texParameteri(sg.TEXTURE_2D, sg.TEXTURE_WRAP_T, sg.CLAMP_TO_EDGE);
    sg.texParameteri(sg.TEXTURE_2D, sg.TEXTURE_MIN_FILTER, sg.LINEAR);
    sg.texParameteri(sg.TEXTURE_2D, sg.TEXTURE_MAG_FILTER, sg.LINEAR);

    function resizeShaderCanvas() {
      shaderCanvas.width  = window.innerWidth;
      shaderCanvas.height = window.innerHeight;
      sg.viewport(0, 0, shaderCanvas.width, shaderCanvas.height);
    }
    resizeShaderCanvas();

    let _mouseX = window.innerWidth * 0.5;
    window.addEventListener('mousemove', e => { _mouseX = e.clientX; });

    function renderRGBShader(srcCanvas, time) {
      sg.useProgram(_rgbProg);
      sg.bindBuffer(sg.ARRAY_BUFFER, _quadBuf);
      sg.enableVertexAttribArray(_aPos);
      sg.vertexAttribPointer(_aPos, 2, sg.FLOAT, false, 0, 0);

      sg.activeTexture(sg.TEXTURE0);
      sg.bindTexture(sg.TEXTURE_2D, _rgbTex);
      sg.pixelStorei(sg.UNPACK_FLIP_Y_WEBGL, true);
      sg.texImage2D(sg.TEXTURE_2D, 0, sg.RGBA, sg.RGBA, sg.UNSIGNED_BYTE, srcCanvas);

      sg.uniform1i(_uTex, 0);
      sg.uniform2f(_uRes, shaderCanvas.width, shaderCanvas.height);
      sg.uniform1f(_uTime, time);
      sg.uniform1f(_uMouseX, _mouseX);

      sg.drawArrays(sg.TRIANGLE_STRIP, 0, 4);
    }

    // ── Font size slider ─────────────────────────────────────────────────────
    document.getElementById('fontSize').addEventListener('input', e => {
      fontSize = +e.target.value;
      stage.style.fontSize = fontSize + 'px';
      pt.font     = `${fontSize}px Consolas, monospace`;
      pt.fontSize = fontSize;
      ({ cols, rows } = charGrid());
      pt.resize(cols, rows);
      pt._preEl = null;
      asciiCanvas.width  = window.innerWidth;
      asciiCanvas.height = window.innerHeight;
      fitStage();
      applyMode();
    });

    // ── Overlay split ────────────────────────────────────────────────────────
    const divider = document.getElementById('divider');
    function setOverlay(pct) {
      stage.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
      shaderCanvas.style.clipPath = `inset(0 0 0 ${pct}%)`;
      divider.style.left = pct + '%';
    }
    setOverlay(100);
    document.getElementById('overlay').addEventListener('input', e => {
      if (splitMode === 'overlay') setOverlay(+e.target.value);
    });

    // ── Split mode ───────────────────────────────────────────────────────────
    let splitMode = 'overlay';
    let sweepTime = 0;

    const modeButtons = {
      overlay:   document.getElementById('modeOverlay'),
      proximity: document.getElementById('modeProximity'),
      sweep:     document.getElementById('modeSweep'),
    };
    const overlayControl = document.getElementById('overlayControl');

    function setMode(mode) {
      splitMode = mode;
      Object.entries(modeButtons).forEach(([k, btn]) =>
        btn.classList.toggle('active', k === mode)
      );
      overlayControl.style.display = mode === 'overlay' ? '' : 'none';
      if (mode === 'overlay') setOverlay(+document.getElementById('overlay').value);
    }

    Object.entries(modeButtons).forEach(([mode, btn]) =>
      btn.addEventListener('click', () => setMode(mode))
    );

    // ── Effect picker ────────────────────────────────────────────────────────
    document.getElementById('effectPicker').addEventListener('change', e => {
      shaderCanvas.style.display = e.target.value === 'rgb' ? '' : 'none';
    });

    function tickSplitMode() {
      if (splitMode === 'proximity') {
        const pct = (_mouseX / window.innerWidth) * 100;
        setOverlay(pct);
      } else if (splitMode === 'sweep') {
        sweepTime += 0.008;
        const pct = 50 + Math.sin(sweepTime) * 48;
        setOverlay(pct);
      }
    }


    // ── Pause ────────────────────────────────────────────────────────────────
    let running = true;
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', () => {
      running = !running;
      pauseBtn.textContent = running ? '⏸ Pause' : '▶ Play';
      if (running) loop();
    });

    // ── Animate ──────────────────────────────────────────────────────────────
    let frameNum = 0;

    function loop() {
      if (!running) return;
      requestAnimationFrame(loop);
      frameNum++;
      FISH.update(frameNum);
      tickSplitMode();
      renderer.render(scene, camera);
      const useRGB = document.getElementById('effectPicker').value === 'rgb';
      if (useRGB) renderRGBShader(glCanvas, frameNum * 0.016);
      const src = useRGB ? glCanvas : renderer.domElement;
      if (useCanvasMode) {
        pt.frame(src, asciiCanvas);
      } else {
        pt.framePre(src, stage);
      }
    }
    loop();
  })();
  </script>
</body>
</html>
