<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perlin Noise Playground — ASCII</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      overflow: hidden;
      margin: 0;
    }

    #stage {
      display: block;
      position: fixed;
      top: 0; left: 0;
      z-index: 3;
      font-size: 11px;
      line-height: 1.15;
      letter-spacing: 0.05em;
      white-space: pre;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Controls overlay */
    #controls {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      z-index: 3;
      transform: translateX(-50%);
      display: flex;
      gap: 1.2rem;
      align-items: center;
      background: rgba(255,255,255,0.88);
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0.5rem 1.4rem;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #333;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    #controls label { font-weight: 700; margin-right: 0.25rem; }

    #controls input[type=range] {
      width: 80px;
      accent-color: #cb4b16;
      cursor: pointer;
      vertical-align: middle;
    }

    #controls select {
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      background: #fff;
    }

    #pauseBtn {
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ccc;
      border-radius: 999px;
      padding: 0.2rem 0.8rem;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
    }
    #pauseBtn:hover { background: #f0f0f0; }

    #glcanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: fill;
    }

    /* pre sits on top of the canvas; background must be transparent */
    #stage { background: transparent; }

    #divider {
      position: fixed;
      top: 0;
      left: 100%;
      width: 100vw;
      height: 100vh;
      background: white;
      pointer-events: none;
      z-index: 2;
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <pre id="stage"></pre>
  <canvas id="glcanvas"></canvas>
  <div id="divider"></div>

  <div id="controls">
    <span><label for="smoothness">Smooth</label><input id="smoothness" type="range" min="10" max="100" value="40"></span>
    <span><label for="amplitude">Amp</label><input id="amplitude" type="range" min="0" max="40" value="12"></span>
    <span><label for="velocity">Vel</label><input id="velocity" type="range" min="1" max="7" step="0.5" value="4"></span>
    <span>
      <label for="fontPicker">Font</label>
      <select id="fontPicker">
        <option value="Georgia, serif" selected>Georgia</option>
        <option value="Palatino Linotype, serif">Palatino</option>
        <option value="Times New Roman, serif">Times New Roman</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Helvetica, sans-serif">Helvetica</option>
        <option value="Verdana, sans-serif">Verdana</option>
        <option value="Trebuchet MS, sans-serif">Trebuchet</option>
        <option value="Impact, sans-serif">Impact</option>
        <option value="Comic Sans MS, cursive">Comic Sans</option>
        <option value="Courier New, monospace">Courier New</option>
      </select>
    </span>
    <span><label for="fontSize">Size</label><input id="fontSize" type="range" min="6" max="22" value="11"></span>
    <span><label for="overlay">Overlay</label><input id="overlay" type="range" min="0" max="100" step="1" value="100"></span>
    <button id="pauseBtn">⏸ Pause</button>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Perlin / Simplex noise (public domain — josephg/noisejs) -->
  <script>
  (function(global){var module=global.noise={};function Grad(x,y,z){this.x=x;this.y=y;this.z=z}Grad.prototype.dot2=function(x,y){return this.x*x+this.y*y};Grad.prototype.dot3=function(x,y,z){return this.x*x+this.y*y+this.z*z};var grad3=[new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];var p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];var perm=new Array(512);var gradP=new Array(512);module.seed=function(seed){if(seed>0&&seed<1){seed*=65536}seed=Math.floor(seed);if(seed<256){seed|=seed<<8}for(var i=0;i<256;i++){var v;if(i&1){v=p[i]^(seed&255)}else{v=p[i]^((seed>>8)&255)}perm[i]=perm[i+256]=v;gradP[i]=gradP[i+256]=grad3[v%12]}};module.seed(0);module.simplex3=function(xin,yin,zin){var n0,n1,n2,n3;var F3=1/3;var s=(xin+yin+zin)*F3;var i=Math.floor(xin+s);var j=Math.floor(yin+s);var k=Math.floor(zin+s);var G3=1/6;var t=(i+j+k)*G3;var X0=i-t;var Y0=j-t;var Z0=k-t;var x0=xin-X0;var y0=yin-Y0;var z0=zin-Z0;var i1,j1,k1;var i2,j2,k2;if(x0>=y0){if(y0>=z0){i1=1;j1=0;k1=0;i2=1;j2=1;k2=0}else if(x0>=z0){i1=1;j1=0;k1=0;i2=1;j2=0;k2=1}else{i1=0;j1=0;k1=1;i2=1;j2=0;k2=1}}else{if(y0<z0){i1=0;j1=0;k1=1;i2=0;j2=1;k2=1}else if(x0<z0){i1=0;j1=1;k1=0;i2=0;j2=1;k2=1}else{i1=0;j1=1;k1=0;i2=1;j2=1;k2=0}}var x1=x0-i1+G3;var y1=y0-j1+G3;var z1=z0-k1+G3;var x2=x0-i2+2*G3;var y2=y0-j2+2*G3;var z2=z0-k2+2*G3;var x3=x0-1+3*G3;var y3=y0-1+3*G3;var z3=z0-1+3*G3;i&=255;j&=255;k&=255;var gi0=gradP[i+perm[j+perm[k]]];var gi1=gradP[i+i1+perm[j+j1+perm[k+k1]]];var gi2=gradP[i+i2+perm[j+j2+perm[k+k2]]];var gi3=gradP[i+1+perm[j+1+perm[k+1]]];var t0=0.6-x0*x0-y0*y0-z0*z0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot3(x0,y0,z0)}var t1=0.6-x1*x1-y1*y1-z1*z1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot3(x1,y1,z1)}var t2=0.6-x2*x2-y2*y2-z2*z2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot3(x2,y2,z2)}var t3=0.6-x3*x3-y3*y3-z3*z3;if(t3<0){n3=0}else{t3*=t3;n3=t3*t3*gi3.dot3(x3,y3,z3)}return 32*(n0+n1+n2+n3)};module.simplex2=function(xin,yin){var n0,n1,n2;var F2=0.5*(Math.sqrt(3)-1);var s=(xin+yin)*F2;var i=Math.floor(xin+s);var j=Math.floor(yin+s);var G2=(3-Math.sqrt(3))/6;var t=(i+j)*G2;var X0=i-t;var Y0=j-t;var x0=xin-X0;var y0=yin-Y0;var i1,j1;if(x0>y0){i1=1;j1=0}else{i1=0;j1=1}var x1=x0-i1+G2;var y1=y0-j1+G2;var x2=x0-1+2*G2;var y2=y0-1+2*G2;i&=255;j&=255;var gi0=gradP[i+perm[j]];var gi1=gradP[i+i1+perm[j+j1]];var gi2=gradP[i+1+perm[j+1]];var t0=0.5-x0*x0-y0*y0;if(t0<0){n0=0}else{t0*=t0;n0=t0*t0*gi0.dot2(x0,y0)}var t1=0.5-x1*x1-y1*y1;if(t1<0){n1=0}else{t1*=t1;n1=t1*t1*gi1.dot2(x1,y1)}var t2=0.5-x2*x2-y2*y2;if(t2<0){n2=0}else{t2*=t2;n2=t2*t2*gi2.dot2(x2,y2)}return 70*(n0+n1+n2)};})(this);
  </script>

  <!-- Pretext library -->
  <script src="pretext.js"></script>

  <script>
  (() => {
    'use strict';

    // ── Sizing ──────────────────────────────────────────────────────────────
    let fontSize = 11;
    let cols, rows;

    function charGrid() {
      // Courier New: width ≈ 0.6×, height ≈ 1.15× font-size
      return {
        cols: Math.floor(window.innerWidth  / (fontSize * 0.6)),
        rows: Math.floor(window.innerHeight / (fontSize * 1.15)),
      };
    }

    const stage = document.getElementById('stage');

    // Stretch letter-spacing and line-height so chars exactly fill the viewport
    function fitStage() {
      const charCssW = window.innerWidth  / cols;
      const charCssH = window.innerHeight / rows;
      stage.style.letterSpacing = (charCssW - fontSize * 0.6) + 'px';
      stage.style.lineHeight    = charCssH + 'px';
    }

    // ── Three.js offscreen scene ─────────────────────────────────────────────
    const glCanvas = document.getElementById('glcanvas');

    const scene    = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff);  // white bg matches page background

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';
    camera.position.set(64, 48, 64);
    camera.rotation.x = -Math.PI / 8;
    camera.rotation.y =  Math.PI / 4;

    // Lighting
    scene.add(new THREE.HemisphereLight(0xdc322f, 0x6c71c4, 0.4));

    // ── Sphere grid ──────────────────────────────────────────────────────────
    const sphereGeos = [
      new THREE.SphereGeometry(0.5, 10, 10),
      new THREE.SphereGeometry(1.0, 12, 12),
      new THREE.SphereGeometry(1.5, 16, 16),
      new THREE.SphereGeometry(2.0, 16, 16),
    ];

    noise.seed(Math.random());

    // Precompute each sphere's hue from its distance to centre of the grid
    const CX = 31.5, CZ = 31.5;
    const MAX_DIST = Math.sqrt(CX * CX + CZ * CZ); // ≈44.5

    const grid = [];
    const hues = [];   // per-sphere hue (0-1), constant

    for (let i = 0; i < 64; i++) {
      grid[i] = [];
      hues[i] = [];
      for (let j = 0; j < 64; j++) {
        const dist = Math.sqrt((i - CX) ** 2 + (j - CZ) ** 2);
        const hue  = dist / MAX_DIST; // 0 = centre, 1 = corner

        hues[i][j] = hue;

        const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(hue, 0.9, 0.5) });
        const geo = sphereGeos[Math.floor(Math.random() * sphereGeos.length)];
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(-32 + i, 1.5 * noise.simplex3(i, j, 0), -32 + j);
        grid[i][j] = mesh;
        scene.add(mesh);
      }
    }

    // ── Pretext ──────────────────────────────────────────────────────────────
    ({ cols, rows } = charGrid());
    const pt = new Pretext({
      cols, rows,
      chars: Pretext.CHARS_WILD,
      color: true,
      satBoost: 2.8,
      lumBoost: 1.4,
      edgeThreshold: 0.28,
      edgeColor: '#000',
    });
    fitStage();

    window.addEventListener('resize', () => {
      ({ cols, rows } = charGrid());
      pt.resize(cols, rows);
      fitStage();
    });

    // ── Font picker ──────────────────────────────────────────────────────────
    document.getElementById('fontPicker').addEventListener('change', (e) => {
      stage.style.fontFamily = e.target.value;
      fitStage();
    });

    // ── Font size slider ─────────────────────────────────────────────────────
    document.getElementById('fontSize').addEventListener('input', (e) => {
      fontSize = +e.target.value;
      stage.style.fontSize = fontSize + 'px';
      ({ cols, rows } = charGrid());
      pt.resize(cols, rows);
      pt._preEl = null; // force span reallocation at new grid size
      fitStage();
    });


    // ── Overlay split slider (left = WebGL, right = ASCII) ──────────────────
    const divider = document.getElementById('divider');
    function setOverlay(pct) {
      stage.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
      divider.style.left = pct + '%';
    }
    setOverlay(100);
    document.getElementById('overlay').addEventListener('input', (e) => {
      setOverlay(+e.target.value);
    });

    // ── Pause ────────────────────────────────────────────────────────────────
    let running = true;
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', () => {
      running = !running;
      pauseBtn.textContent = running ? '⏸ Pause' : '▶ Play';
      if (running) loop();
    });

    // ── Animate ──────────────────────────────────────────────────────────────
    let frameNum = 0;

    function loop() {
      if (!running) return;
      requestAnimationFrame(loop);
      frameNum++;

      const amp        = +document.getElementById('amplitude').value;
      const smoothness = +document.getElementById('smoothness').value;
      const vel        = Math.pow(2, 11 - +document.getElementById('velocity').value);

      for (let i = 0; i < 64; i++) {
        for (let j = 0; j < 64; j++) {
          const mesh = grid[i][j];
          const y = 5 + amp * noise.simplex3(i / smoothness, j / smoothness, frameNum / vel);
          mesh.position.y = y;

          // Lightness driven by height: valleys dark, peaks bright
          const normY = amp > 0 ? Math.max(0, Math.min(1, (y - 5) / amp * 0.5 + 0.5)) : 0.5;
          const lightness = 0.15 + 0.75 * normY;
          mesh.material.color.setHSL(hues[i][j], 0.9, lightness);
        }
      }

      renderer.render(scene, camera);
      pt.framePre(glCanvas, stage);
    }
    loop();
  })();
  </script>
</body>
</html>
